services:
  everydocs_core:
    image: jonashellmann/everydocs:latest
    restart: unless-stopped
    depends_on:
      everydocs_db:
        condition: service_healthy
    environment:
      SECRET_KEY_BASE: "${SECRET_KEY_BASE}"
      EVERYDOCS_DB_ADAPTER: mysql2
      EVERYDOCS_DB_NAME: everydocs
      EVERYDOCS_DB_USER: everydocs
      EVERYDOCS_DB_PASSWORD: "${DB_PASSWORD}"
      EVERYDOCS_DB_HOST: everydocs_db
      EVERYDOCS_DB_PORT: "3306"
    volumes:
      - everydocs_files:/var/everydocs-files
    ports:
      - "5678:5678"

  everydocs_web:
    image: jonashellmann/everydocs-web:latest
    restart: unless-stopped
    ports:
      - "8080:80"

  everydocs_db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD}"
      MYSQL_DATABASE: everydocs
      MYSQL_USER: everydocs
      MYSQL_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "everydocs", "--password=${DB_PASSWORD}"]
      start_period: 5s
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
  everydocs_files:

services:
  postgres:
    image: postgres:16-alpine
    container_name: linkwarden-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-linkwarden}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-linkwarden}
      - POSTGRES_DB=${POSTGRES_DB:-linkwarden}
    volumes:
      - ./pgdata:/var/lib/postgresql/data

  linkwarden:
    image: ghcr.io/linkwarden/linkwarden:latest
    container_name: linkwarden
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-linkwarden}:${POSTGRES_PASSWORD:-linkwarden}@postgres:5432/${POSTGRES_DB:-linkwarden}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-supersecretchangeme}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - MEILI_ADDR=http://meilisearch:7700
    volumes:
      - ./data:/data/data
    depends_on:
      - postgres
      - meilisearch
    env_file:
      - .env

  meilisearch:
    image: getmeili/meilisearch:v1.12.8
    container_name: linkwarden-meilisearch
    restart: unless-stopped
    volumes:
      - ./meili_data:/meili_data

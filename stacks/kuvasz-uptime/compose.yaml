services:
  kuvasz-db:
    image: pgautoupgrade/pgautoupgrade:18-alpine
    container_name: kuvaszdb
    restart: unless-stopped
    environment:
      POSTGRES_USER: kuvasz
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      TZ: "UTC"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "kuvasz"]
      interval: 10s
      start_period: 30s
    volumes:
      - kuvasz-db-data:/var/lib/postgresql

  kuvasz:
    image: kuvaszmonitoring/kuvasz:latest
    container_name: kuvasz
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      TZ: "UTC"
      DATABASE_HOST: kuvaszdb
      DATABASE_USER: kuvasz
      DATABASE_PASSWORD: ${DB_PASSWORD:-changeme}
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme12chars}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-changeme16characters}
    volumes:
      - ./kuvasz.yml:/config/kuvasz.yml
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8080/api/v2/health || exit 1"]
      interval: 60s
      start_period: 30s
    depends_on:
      - kuvasz-db

volumes:
  kuvasz-db-data:

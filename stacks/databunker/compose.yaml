services:
  postgresql:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-databunker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-databunkerdb}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-databunker}"]
      interval: 5s
      timeout: 5s
      retries: 5

  databunker:
    image: securitybunker/databunker:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABUNKER_PGHOST: postgresql
      DATABUNKER_PGPORT: "5432"
      DATABUNKER_PGUSER: ${POSTGRES_USER:-databunker}
      DATABUNKER_PGPASSWORD: ${POSTGRES_PASSWORD:-changeme}
      DATABUNKER_PGDATABASE: ${POSTGRES_DB:-databunkerdb}
    depends_on:
      postgresql:
        condition: service_healthy

volumes:
  postgres-data:

services:
  weblate:
    image: weblate/weblate
    depends_on:
      - database
      - cache
    ports:
      - "8080:8080"
    volumes:
      - weblate-data:/app/data
      - weblate-cache:/app/cache
    environment:
      WEBLATE_DEBUG: "0"
      WEBLATE_LOGLEVEL: INFO
      WEBLATE_SITE_TITLE: Weblate
      WEBLATE_ADMIN_NAME: Weblate Admin
      WEBLATE_ADMIN_EMAIL: weblate@example.com
      WEBLATE_ADMIN_PASSWORD: ${WEBLATE_ADMIN_PASSWORD:-changeme}
      WEBLATE_SERVER_EMAIL: weblate@example.com
      WEBLATE_DEFAULT_FROM_EMAIL: weblate@example.com
      WEBLATE_ALLOWED_HOSTS: "*"
      WEBLATE_REGISTRATION_OPEN: "1"
      POSTGRES_PASSWORD: weblate
      POSTGRES_USER: weblate
      POSTGRES_DB: weblate
      POSTGRES_HOST: database
      REDIS_HOST: cache
      REDIS_PORT: "6379"
    restart: always
    read_only: true
    tmpfs:
      - /run
      - /tmp

  database:
    image: postgres:16-alpine
    volumes:
      - postgres-data:/var/lib/postgresql
    environment:
      POSTGRES_PASSWORD: weblate
      POSTGRES_USER: weblate
      POSTGRES_DB: weblate
    restart: always

  cache:
    image: valkey/valkey:9
    volumes:
      - redis-data:/data
    command:
      - valkey-server
      - --save
      - "60"
      - "1"
      - --loglevel
      - warning
    restart: always
    read_only: true

volumes:
  weblate-data:
  weblate-cache:
  postgres-data:
  redis-data:

services:
  backend:
    image: infisical/infisical:latest
    container_name: infisical-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "${INFISICAL_PORT:-80}:8080"
    environment:
      NODE_ENV: production
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      AUTH_SECRET: ${AUTH_SECRET}
      DB_CONNECTION_URI: postgres://${POSTGRES_USER:-infisical}:${POSTGRES_PASSWORD:-infisical}@db:5432/${POSTGRES_DB:-infisical}
      REDIS_URL: redis://redis:6379
      SITE_URL: ${SITE_URL:-http://localhost:80}
    networks:
      - infisical

  redis:
    image: redis:7-alpine
    container_name: infisical-redis
    restart: always
    environment:
      ALLOW_EMPTY_PASSWORD: "yes"
    networks:
      - infisical
    volumes:
      - redis_data:/data

  db:
    image: postgres:14-alpine
    container_name: infisical-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-infisical}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-infisical}
      POSTGRES_DB: ${POSTGRES_DB:-infisical}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - infisical
    healthcheck:
      test: ["CMD-SHELL", "pg_isready --username=${POSTGRES_USER:-infisical} && psql --username=${POSTGRES_USER:-infisical} --list"]
      interval: 5s
      timeout: 10s
      retries: 10

volumes:
  pg_data:
  redis_data:

networks:
  infisical:

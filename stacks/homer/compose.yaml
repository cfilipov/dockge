services:
  homer:
    image: b4bz/homer:latest
    container_name: homer
    ports:
      - "${HOMER_PORT:-8080}:8080"
    volumes:
      - homer-assets:/www/assets
    environment:
      - INIT_ASSETS=${INIT_ASSETS:-1}
      - UID=${PUID:-1000}
      - GID=${PGID:-1000}
    restart: unless-stopped

volumes:
  homer-assets:

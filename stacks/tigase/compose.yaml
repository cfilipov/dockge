services:
  xmpp:
    image: tigase/tigase-xmpp-server:latest
    container_name: tigase
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:8080"
      - "5222:5222"
      - "5223:5223"
      - "5269:5269"
      - "5280:5280"
      - "5290:5290"
    volumes:
      - tigase-etc:/home/tigase/tigase-server/etc
      - tigase-data:/home/tigase/tigase-server/data
      - tigase-logs:/home/tigase/tigase-server/logs
      - tigase-db:/home/tigase/tigase-server/tigasedb
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_ROOT_USER=root
      - DB_ROOT_PASS=root

  db:
    image: postgres:latest
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  tigase-etc:
  tigase-data:
  tigase-logs:
  tigase-db:
  postgres-data:

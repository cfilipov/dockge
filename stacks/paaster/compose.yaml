services:
  paaster:
    image: wardpearce/paaster:latest
    container_name: paaster
    restart: unless-stopped
    ports:
      - "${PAASTER_PORT:-3015}:3000"
    environment:
      - COOKIE_SECRET=${COOKIE_SECRET:-changeme-cookie-secret}
      - S3_ENDPOINT=http://paaster-minio:9000
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minioadmin}
      - S3_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-minioadmin123}
      - S3_BUCKET=${S3_BUCKET:-paaster}
      - s3_FORCE_PATH_STYLE=true
      - MONGO_DB=paasterv3
      - MONGO_URL=mongodb://paaster-mongodb:27017
    depends_on:
      - paaster-mongodb
      - paaster-minio

  paaster-mongodb:
    image: mongo:7
    container_name: paaster-mongodb
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    environment:
      - MONGODB_DATA_DIR=/data/db

  paaster-minio:
    image: quay.io/minio/minio:latest
    container_name: paaster-minio
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"

volumes:
  mongo-data:
  minio-data:

services:
  db:
    image: mariadb:11.2
    container_name: linkace-db
    restart: unless-stopped
    command: mariadbd --character-set-server=utf8mb4 --collation-server=utf8mb4_bin
    environment:
      - MARIADB_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-rootpassword}
      - MARIADB_DATABASE=${DB_DATABASE:-linkace}
      - MARIADB_USER=${DB_USERNAME:-linkace}
      - MARIADB_PASSWORD=${DB_PASSWORD:-ChangeThisToASecurePassword}
    volumes:
      - db_data:/var/lib/mysql

  app:
    image: linkace/linkace:latest
    container_name: linkace
    restart: unless-stopped
    depends_on:
      - db
      - redis
    volumes:
      - linkace_app:/app
      - linkace_logs:/app/storage/logs
      - ./backups:/app/storage/app/backups
    env_file:
      - .env

  nginx:
    image: nginx:1.24
    container_name: linkace-nginx
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    depends_on:
      - app
    volumes:
      - linkace_app:/app
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

  redis:
    image: redis:7.2
    container_name: linkace-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-ChangeThisToASecurePassword}

volumes:
  db_data:
    driver: local
  linkace_app:
  linkace_logs:

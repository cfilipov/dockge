version: "3.8"

services:
  captain:
    image: sip3/sip3-captain-ce:latest
    container_name: sip3-captain
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./captain.yml:/etc/sip3-captain/application.yml

  salto:
    image: sip3/sip3-salto-ce:latest
    container_name: sip3-salto
    restart: unless-stopped
    ports:
      - "15060:15060/udp"
    volumes:
      - ./salto.yml:/etc/sip3-salto/application.yml
    depends_on:
      - mongo

  twig:
    image: sip3/sip3-twig-ce:latest
    container_name: sip3-twig
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./twig.yml:/etc/sip3-twig/application.yml
    depends_on:
      - mongo

  grafana:
    image: sip3/sip3-grafana:latest
    container_name: sip3-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"

  mongo:
    image: mongo:6
    container_name: sip3-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:

services:
  database:
    image: postgres:16-alpine
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_PASSWORD: mysecretpassword
    volumes:
      - postgres-data:/var/lib/postgresql/data

  osem:
    image: registry.opensuse.org/opensuse/infrastructure/dale/containers/osem/base:latest
    command: foreman start -p 3000
    depends_on:
      - database
    ports:
      - "3000:3000"

volumes:
  postgres-data:

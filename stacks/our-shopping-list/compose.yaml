services:
  mongodb:
    image: mongo:6
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db

  our-shopping-list:
    image: ourshoppinglist/our-shopping-list:latest
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    environment:
      OSL_MONGO_URI: mongodb://mongodb:27017/osl
      OSL_PORT: "8080"
    depends_on:
      - mongodb

volumes:
  mongo-data:

services:
  medusa:
    image: lscr.io/linuxserver/medusa:latest
    container_name: medusa
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Etc/UTC}
    volumes:
      - ./config:/config
      - ${DOWNLOADS_DIR}:/downloads
      - ${TV_DIR}:/tv
    ports:
      - "${PORT:-8081}:8081"
    restart: unless-stopped

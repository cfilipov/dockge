services:
  mealie:
    image: ghcr.io/mealie-recipes/mealie:latest
    container_name: mealie
    restart: unless-stopped
    ports:
      - "${MEALIE_PORT}:9000"
    environment:
      - ALLOW_SIGNUP=${ALLOW_SIGNUP}
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - MAX_WORKERS=1
      - WEB_CONCURRENCY=1
      - BASE_URL=${BASE_URL}
      - DB_ENGINE=sqlite
    volumes:
      - mealie-data:/app/data/

volumes:
  mealie-data:

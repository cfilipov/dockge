services:
  heyform:
    image: heyform/community-edition:latest
    ports:
      - "${HEYFORM_PORT:-9513}:9513"
    environment:
      APP_HOMEPAGE_URL: ${APP_HOMEPAGE_URL}
      SESSION_KEY: ${SESSION_KEY}
      FORM_ENCRYPTION_KEY: ${FORM_ENCRYPTION_KEY}
      MONGO_URI: mongodb://mongo:27017/heyform
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      - mongo
      - redis
    restart: unless-stopped

  mongo:
    image: mongo:7
    volumes:
      - heyform_db:/data/db
    restart: unless-stopped

  redis:
    image: redis:7
    volumes:
      - heyform_redis:/data
    restart: unless-stopped

volumes:
  heyform_db:
  heyform_redis:

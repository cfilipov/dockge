services:
  bigtree:
    image: php:8.1-apache
    container_name: bigtree
    ports:
      - "8080:80"
    depends_on:
      - mysql
    volumes:
      - bigtree_data:/var/www/html
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: bigtree-mysql
    environment:
      MYSQL_DATABASE: bigtree
      MYSQL_USER: bigtree
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  bigtree_data:
  mysql_data:

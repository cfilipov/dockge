services:
  database:
    image: postgres:14
    container_name: zulip-db
    environment:
      POSTGRES_DB: zulip
      POSTGRES_USER: zulip
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgresql_data:/var/lib/postgresql/data
    restart: unless-stopped

  memcached:
    image: memcached:alpine
    container_name: zulip-memcached
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4
    container_name: zulip-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: zulip
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: zulip-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    restart: unless-stopped

  zulip:
    image: ghcr.io/zulip/zulip-server:11.5-2
    container_name: zulip
    ports:
      - "80:80"
      - "443:443"
    environment:
      DB_HOST: database
      DB_HOST_PORT: "5432"
      DB_USER: zulip
      SETTING_MEMCACHED_LOCATION: "memcached:11211"
      SETTING_RABBITMQ_HOST: rabbitmq
      SETTING_REDIS_HOST: redis
      SECRETS_email_password: ${EMAIL_PASSWORD}
      SECRETS_rabbitmq_password: ${RABBITMQ_PASSWORD}
      SECRETS_postgres_password: ${POSTGRES_PASSWORD}
      SECRETS_redis_password: ${REDIS_PASSWORD}
      SECRETS_secret_key: ${SECRET_KEY}
      SETTING_EXTERNAL_HOST: ${ZULIP_DOMAIN}
      SETTING_ZULIP_ADMINISTRATOR: ${ZULIP_ADMIN_EMAIL}
      SSL_CERTIFICATE_GENERATION: self-signed
    volumes:
      - zulip_data:/data
    ulimits:
      nofile:
        soft: 1000000
        hard: 1048576
    depends_on:
      - database
      - memcached
      - rabbitmq
      - redis
    restart: unless-stopped

volumes:
  postgresql_data:
  redis_data:
  zulip_data:

services:
  redis:
    image: redis:alpine
    command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:alpine
    restart: unless-stopped

  db:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: pimcore
      MYSQL_USER: pimcore
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command: ["mysqld", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    restart: unless-stopped

  php:
    image: pimcore/pimcore:php8.3-debug-latest
    environment:
      PIMCORE_INSTALL_MYSQL_HOST_SOCKET: db
      PIMCORE_INSTALL_MYSQL_USERNAME: pimcore
      PIMCORE_INSTALL_MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      PIMCORE_INSTALL_MYSQL_DATABASE: pimcore
      PIMCORE_INSTALL_MYSQL_PORT: "3306"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  supervisord:
    image: pimcore/pimcore:php8.3-supervisord-latest
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:

services:
  haproxy:
    image: haproxy:${HAPROXY_VERSION:-lts}
    container_name: haproxy
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${STATS_PORT:-8404}:8404"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro

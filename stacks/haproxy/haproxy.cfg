global
    log stdout format raw local0

defaults
    log     global
    mode    http
    option  httplog
    timeout connect 5s
    timeout client  50s
    timeout server  50s

frontend http_front
    bind *:80
    default_backend http_back

frontend stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s

backend http_back
    server app1 app:8080 check

services:
  pwpush:
    image: docker.io/pglombardo/pwpush:latest
    container_name: pwpush
    restart: unless-stopped
    ports:
      - "${PWPUSH_PORT:-5100}:5100"
    volumes:
      - pwpush-storage:/opt/PasswordPusher/storage
    environment:
      - PWP__ENABLE_URL_PUSHES=${PWP__ENABLE_URL_PUSHES:-true}
      - PWP__ENABLE_FILE_PUSHES=${PWP__ENABLE_FILE_PUSHES:-true}
      - PWP__ENABLE_QR_PUSHES=${PWP__ENABLE_QR_PUSHES:-true}
      - PWP__ALLOW_ANONYMOUS=${PWP__ALLOW_ANONYMOUS:-true}
      - PWP__FILES__STORAGE=${PWP__FILES__STORAGE:-local}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5100/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  pwpush-storage:

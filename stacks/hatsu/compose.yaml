services:
  hatsu:
    image: ghcr.io/importantimport/hatsu:latest
    restart: unless-stopped
    ports:
      - "3939:3939"
    depends_on:
      - db
    environment:
      HATSU_DATABASE_URL: postgres://hatsu:${DB_PASSWORD}@db:5432/hatsu
      HATSU_DOMAIN: ${HATSU_DOMAIN}
      HATSU_PRIMARY_ACCOUNT: ${HATSU_PRIMARY_ACCOUNT}
    volumes:
      - hatsu-data:/app/data

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: hatsu
      POSTGRES_USER: hatsu
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  hatsu-data:
  db-data:

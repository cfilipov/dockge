services:
  yaffa:
    image: kantorge/yaffa:latest
    container_name: yaffa
    ports:
      - "${APP_PORT:-80}:80"
    environment:
      - APP_KEY=${APP_KEY:-base64:changeme-generate-laravel-key}
      - APP_URL=${APP_URL:-http://localhost}
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-yaffa}
      - DB_USERNAME=${DB_USERNAME:-yaffa}
      - DB_PASSWORD=${DB_PASSWORD:-changeme}
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mysql/mysql-server:8.0
    container_name: yaffa-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-changeme}
      MYSQL_ROOT_HOST: '%'
      MYSQL_DATABASE: ${DB_DATABASE:-yaffa}
      MYSQL_USER: ${DB_USERNAME:-yaffa}
      MYSQL_PASSWORD: ${DB_PASSWORD:-changeme}
      MYSQL_ALLOW_EMPTY_PASSWORD: 1
    volumes:
      - db-data:/var/lib/mysql
    restart: unless-stopped

volumes:
  db-data:

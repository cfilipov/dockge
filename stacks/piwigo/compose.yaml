services:
  piwigo:
    image: linuxserver/piwigo:latest
    container_name: piwigo
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_started
    ports:
      - "${PIWIGO_PORT:-80}:80"
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Etc/UTC}
    volumes:
      - piwigo-config:/config
      - ${GALLERY_DIR:-./gallery}:/gallery

  mariadb:
    image: mariadb:11
    container_name: piwigo-mariadb
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${MYSQL_DATABASE:-piwigo}
      MARIADB_USER: ${MYSQL_USER:-piwigo}
      MARIADB_PASSWORD: ${MYSQL_PASSWORD:-piwigosecret}
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret}
    volumes:
      - piwigo-db:/var/lib/mysql

volumes:
  piwigo-config:
  piwigo-db:

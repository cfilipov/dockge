services:
  gitbucket:
    image: gitbucket/gitbucket:${GITBUCKET_VERSION:-latest}
    container_name: gitbucket
    restart: unless-stopped
    ports:
      - "${GITBUCKET_HTTP_PORT:-8080}:8080"
      - "${GITBUCKET_SSH_PORT:-29418}:29418"
    volumes:
      - gitbucket-data:/gitbucket
    environment:
      - GITBUCKET_HOME=/gitbucket
      - GITBUCKET_DB_URL=${GITBUCKET_DB_URL:-}
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-3145728}

volumes:
  gitbucket-data:

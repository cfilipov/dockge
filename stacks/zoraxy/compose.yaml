services:
  zoraxy:
    image: zoraxydocker/zoraxy:${ZORAXY_VERSION:-latest}
    container_name: zoraxy
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${ADMIN_PORT:-8000}:8000"
    volumes:
      - ./config:/opt/zoraxy/config
      - ./plugin:/opt/zoraxy/plugin
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - FASTGEOIP=${FASTGEOIP:-true}

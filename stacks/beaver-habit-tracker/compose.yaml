services:
  beaverhabits:
    image: daya0576/beaverhabits:latest
    container_name: beaverhabits
    user: "1000:1000"
    environment:
      - HABITS_STORAGE=${HABITS_STORAGE:-USER_DISK}
      - TRUSTED_LOCAL_EMAIL=${TRUSTED_LOCAL_EMAIL:-admin@example.com}
      - INDEX_HABIT_DATE_COLUMNS=${INDEX_HABIT_DATE_COLUMNS:-5}
      - ENABLE_IOS_STANDALONE=${ENABLE_IOS_STANDALONE:-true}
    volumes:
      - beaver-data:/app/.user/
    ports:
      - "${BEAVER_PORT:-8080}:8080"
    restart: unless-stopped

volumes:
  beaver-data:

version: "3.8"

services:
  freepbx:
    image: tiredofit/freepbx:latest
    container_name: freepbx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "5060:5060/udp"
      - "5060:5060/tcp"
      - "5160:5160/udp"
      - "5160:5160/tcp"
      - "18000-18100:18000-18100/udp"
    volumes:
      - freepbx-data:/data
      - ./logs:/var/log
    environment:
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - ENABLE_FAIL2BAN=FALSE
      - TZ=UTC
    depends_on:
      - mariadb

  mariadb:
    image: mariadb:10.11
    container_name: freepbx-db
    restart: unless-stopped
    volumes:
      - db-data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASS}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASS}

volumes:
  freepbx-data:
  db-data:

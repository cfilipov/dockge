services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage-gethomepage
    ports:
      - "${HOMEPAGE_PORT:-3000}:3000"
    volumes:
      - ./config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    restart: unless-stopped

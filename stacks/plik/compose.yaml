services:
  plik:
    image: rootgg/plik:latest
    container_name: plik
    restart: unless-stopped
    ports:
      - "${PLIK_PORT:-8080}:8080"
    environment:
      PLIKD_LISTEN_ADDRESS: "0.0.0.0"
      PLIKD_LISTEN_PORT: "8080"
      PLIKD_MAX_FILE_SIZE: ${PLIK_MAX_FILE_SIZE:-10737418240}
      PLIKD_DEFAULT_TTL: ${PLIK_DEFAULT_TTL:-2592000}
    volumes:
      - plik-data:/home/plik/server/files

volumes:
  plik-data:

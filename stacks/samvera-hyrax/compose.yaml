services:
  web:
    image: ghcr.io/samvera/hyrax-dev:${HYRAX_TAG:-latest}
    command: sh -c 'bundle exec puma -v -b tcp://0.0.0.0:3000'
    stdin_open: true
    tty: true
    user: root
    environment:
      - RAILS_ROOT=/app/samvera/hyrax-webapp
      - DATABASE_URL=postgresql://hyrax_user:hyrax_password@postgres/hyrax
      - FEDORA_URL=http://fcrepo:8080/fcrepo/rest
      - MEMCACHED_HOST=memcached
      - REDIS_HOST=redis
      - SOLR_URL=http://solr:8983/solr/hyrax
      - SECRET_KEY_BASE=changeme
    depends_on:
      - worker
      - fcrepo
      - fits
      - memcached
      - postgres
      - redis
      - solr
    ports:
      - "3000:3000"
    volumes:
      - hyrax-derivatives:/app/samvera/hyrax-webapp/derivatives
      - hyrax-uploads:/app/samvera/hyrax-webapp/uploads
      - rails-public:/app/samvera/hyrax-webapp/public
      - rails-tmp:/app/samvera/hyrax-webapp/tmp
    networks:
      - hyrax

  worker:
    image: ghcr.io/samvera/hyrax-dev:${HYRAX_TAG:-latest}
    command: sh -c 'bundle exec sidekiq'
    user: root
    environment:
      - RAILS_ROOT=/app/samvera/hyrax-webapp
      - DATABASE_URL=postgresql://hyrax_user:hyrax_password@postgres/hyrax
      - FEDORA_URL=http://fcrepo:8080/fcrepo/rest
      - MEMCACHED_HOST=memcached
      - REDIS_HOST=redis
      - SOLR_URL=http://solr:8983/solr/hyrax
      - SECRET_KEY_BASE=changeme
    depends_on:
      - fcrepo
      - fits
      - memcached
      - postgres
      - redis
      - solr
    volumes:
      - hyrax-derivatives:/app/samvera/hyrax-webapp/derivatives
      - hyrax-uploads:/app/samvera/hyrax-webapp/uploads
      - rails-public:/app/samvera/hyrax-webapp/public
      - rails-tmp:/app/samvera/hyrax-webapp/tmp
    networks:
      - hyrax

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: hyrax_user
      POSTGRES_PASSWORD: hyrax_password
      POSTGRES_DB: hyrax
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - db:/var/lib/postgresql/data
    networks:
      - hyrax

  fcrepo:
    image: ghcr.io/samvera/fcrepo4:4.7.5
    volumes:
      - fcrepo:/data
    ports:
      - "8080:8080"
    networks:
      - hyrax

  fits:
    image: ghcr.io/samvera/fitsservlet:1.6.0
    networks:
      - hyrax

  memcached:
    image: bitnamilegacy/memcached
    ports:
      - "11211:11211"
    networks:
      - hyrax

  redis:
    image: bitnamilegacy/redis:6.2
    environment:
      ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - redis:/bitnamilegacy/redis/data
    networks:
      - hyrax

  solr:
    image: solr:9.9
    ports:
      - "8983:8983"
    command:
      - sh
      - "-c"
      - "solr-precreate hyrax /opt/solr/server/configsets/_default"
    volumes:
      - solr_home:/var/solr
    ulimits:
      nofile:
        soft: 65536
        hard: 524288
    networks:
      - hyrax

volumes:
  db:
  fcrepo:
  hyrax-derivatives:
  hyrax-uploads:
  rails-public:
  rails-tmp:
  redis:
  solr_home:

networks:
  hyrax:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-hyrax

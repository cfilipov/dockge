services:
  globaleaks:
    image: globaleaks/globaleaks:latest
    container_name: globaleaks
    ports:
      - "8080:8080"
      - "8443:8443"
      - "80:80"
      - "443:443"
    volumes:
      - globaleaks_data:/var/globaleaks:rw
    healthcheck:
      test: ["CMD-SHELL", "curl -skf https://localhost:8443/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 12
      start_period: 60s
    restart: unless-stopped

volumes:
  globaleaks_data:

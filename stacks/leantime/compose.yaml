services:
  leantime_db:
    image: mysql:${MYSQL_VERSION:-8.4}
    container_name: leantime-db
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-321.qwerty}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-leantime}
      - MYSQL_USER=${MYSQL_USER:-lean}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-lean}
    command: --character-set-server=UTF8MB4 --collation-server=UTF8MB4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - leantime-net

  leantime:
    image: leantime/leantime:${LEAN_VERSION:-latest}
    container_name: leantime
    restart: unless-stopped
    ports:
      - "${LEAN_PORT:-8080}:8080"
    volumes:
      - public_userfiles:/var/www/html/public/userfiles
      - userfiles:/var/www/html/userfiles
      - plugins:/var/www/html/app/Plugins
    environment:
      - LEAN_DB_HOST=leantime_db
      - LEAN_DB_USER=${MYSQL_USER:-lean}
      - LEAN_DB_PASSWORD=${MYSQL_PASSWORD:-lean}
      - LEAN_DB_DATABASE=${MYSQL_DATABASE:-leantime}
      - LEAN_SITENAME=${LEAN_SITENAME:-Leantime}
    depends_on:
      leantime_db:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_add:
      - CAP_CHOWN
      - CAP_SETGID
      - CAP_SETUID
    networks:
      - leantime-net

volumes:
  db_data:
  userfiles:
  public_userfiles:
  plugins:

networks:
  leantime-net:

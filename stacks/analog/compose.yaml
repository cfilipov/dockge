services:
  analog:
    image: node:20-alpine
    container_name: analog
    ports:
      - "3000:80"
    environment:
      - ANALOG_STATIC_SERVER=true
      - ANALOG_PORT_SERVER=80
      - ANALOG_DATABASE_PROVIDER=redis
      - ANALOG_REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: analog-redis
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:

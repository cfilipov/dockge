services:
  gancio:
    image: framasoft/gancio:latest
    ports:
      - "${GANCIO_PORT:-13120}:13120"
    volumes:
      - ./config.json:/gancio/config.json:ro
      - gancio_uploads:/gancio/uploads
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:16
    volumes:
      - gancio_db:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    restart: unless-stopped

volumes:
  gancio_db:
  gancio_uploads:

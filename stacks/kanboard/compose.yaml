services:
  kanboard:
    image: kanboard/kanboard:latest
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:80"
    volumes:
      - data:/var/www/app/data
      - plugins:/var/www/app/plugins
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:///var/www/app/data/db.sqlite}

volumes:
  data:
  plugins:

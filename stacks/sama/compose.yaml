services:
  sama-server:
    image: samacloud/sama-server:latest
    container_name: sama-server
    ports:
      - "9000:9000"
    environment:
      MONGO_URI: "mongodb://mongo:27017/sama"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      - mongo
      - redis
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: sama-mongo
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: sama-redis
    restart: unless-stopped

volumes:
  mongo_data:

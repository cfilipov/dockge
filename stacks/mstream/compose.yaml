services:
  mstream:
    image: lscr.io/linuxserver/mstream:latest
    container_name: mstream
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Etc/UTC}
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ${CONFIG_DIR:-./config}:/config
      - ${MUSIC_DIR:-./music}:/music
    restart: unless-stopped

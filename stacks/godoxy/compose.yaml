services:
  socket-proxy:
    image: ghcr.io/yusing/socket-proxy:latest
    container_name: godoxy-socket-proxy
    restart: unless-stopped
    environment:
      - ALLOW_START=1
      - ALLOW_STOP=1
      - ALLOW_RESTARTS=1
      - CONTAINERS=1
      - EVENTS=1
      - INFO=1
      - PING=1
      - POST=1
      - VERSION=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    tmpfs:
      - /run
    ports:
      - "${SOCKET_PROXY_ADDR:-127.0.0.1:2375}:2375"

  frontend:
    image: ghcr.io/yusing/godoxy-frontend:${GODOXY_TAG:-latest}
    container_name: godoxy-frontend
    restart: unless-stopped
    depends_on:
      - app
    labels:
      proxy.aliases: ${GODOXY_FRONTEND_ALIASES:-godoxy}

  app:
    image: ghcr.io/yusing/godoxy:${GODOXY_TAG:-latest}
    container_name: godoxy-proxy
    restart: always
    network_mode: host
    depends_on:
      socket-proxy:
        condition: service_started
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    environment:
      - DOCKER_HOST=tcp://${SOCKET_PROXY_ADDR:-127.0.0.1:2375}
    volumes:
      - ./config:/app/config
      - ./logs:/app/logs
      - ./error_pages:/app/error_pages:ro
      - ./data:/app/data
      - ./certs:/app/certs

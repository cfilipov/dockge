services:
  inboxen:
    image: crazymax/inboxen:latest
    restart: unless-stopped
    ports:
      - "${INBOXEN_PORT:-8080}:8080"
    environment:
      INBOXEN_SECRET_KEY: ${INBOXEN_SECRET_KEY:-change-me-to-a-random-string}
      INBOXEN_DB_HOST: db
      INBOXEN_DB_PORT: 5432
      INBOXEN_DB_NAME: ${POSTGRES_DB:-inboxen}
      INBOXEN_DB_USER: ${POSTGRES_USER:-inboxen}
      INBOXEN_DB_PASSWORD: ${POSTGRES_PASSWORD:-inboxen}
    depends_on:
      - db
    volumes:
      - inboxen-data:/data

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-inboxen}
      POSTGRES_USER: ${POSTGRES_USER:-inboxen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inboxen}
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  inboxen-data:
  postgres-data:

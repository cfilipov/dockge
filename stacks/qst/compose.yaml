services:
  qst:
    image: elquimista/qst:latest
    container_name: qst
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:8080"
    environment:
      - QST_DB_HOST=postgres
      - QST_DB_NAME=${DB_NAME:-qst}
      - QST_DB_USER=${DB_USER:-qst}
      - QST_DB_PASSWORD=${DB_PASSWORD:-changeme}
      - QST_SECRET_KEY=${SECRET_KEY:-changeme}
    volumes:
      - qst_data:/app/data
    depends_on:
      - postgres

  postgres:
    image: postgres:15-alpine
    container_name: qst-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER:-qst}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-changeme}
      - POSTGRES_DB=${DB_NAME:-qst}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  qst_data:
  postgres_data:

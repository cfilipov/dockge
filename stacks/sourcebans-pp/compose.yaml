services:
  sourcebans:
    image: php:8.1-apache
    container_name: sourcebans
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./web:/var/www/html
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME:-sourcebans}
      DB_USER: ${DB_USER:-sourcebans}
      DB_PASSWORD: ${DB_PASSWORD:-sbpppass}
    depends_on:
      - db

  db:
    image: mariadb:10.11
    container_name: sourcebans-db
    restart: unless-stopped
    volumes:
      - ./mysql-data:/var/lib/mysql
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MARIADB_DATABASE: ${DB_NAME:-sourcebans}
      MARIADB_USER: ${DB_USER:-sourcebans}
      MARIADB_PASSWORD: ${DB_PASSWORD:-sbpppass}

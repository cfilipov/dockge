services:
  inventree-db:
    image: postgres:17
    container_name: inventree-db
    expose:
      - ${INVENTREE_DB_PORT:-5432}/tcp
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdb
      - POSTGRES_USER=${INVENTREE_DB_USER:-pguser}
      - POSTGRES_PASSWORD=${INVENTREE_DB_PASSWORD:-pgpassword}
      - POSTGRES_DB=${INVENTREE_DB_NAME:-inventree}
    volumes:
      - inventree-data:/var/lib/postgresql/data/
    restart: unless-stopped

  inventree-cache:
    image: redis:7-alpine
    container_name: inventree-cache
    expose:
      - ${INVENTREE_CACHE_PORT:-6379}
    restart: always

  inventree-server:
    image: inventree/inventree:${INVENTREE_TAG:-stable}
    container_name: inventree-server
    expose:
      - ${INVENTREE_WEB_PORT:-8000}
    depends_on:
      - inventree-db
      - inventree-cache
    env_file:
      - .env
    volumes:
      - inventree-app-data:/home/inventree/data
    restart: unless-stopped

  inventree-worker:
    image: inventree/inventree:${INVENTREE_TAG:-stable}
    container_name: inventree-worker
    command: invoke worker
    depends_on:
      - inventree-server
    env_file:
      - .env
    volumes:
      - inventree-app-data:/home/inventree/data
    restart: unless-stopped

  inventree-proxy:
    image: caddy:alpine
    container_name: inventree-proxy
    restart: always
    depends_on:
      - inventree-server
    ports:
      - ${INVENTREE_HTTP_PORT:-1080}:80
      - ${INVENTREE_HTTPS_PORT:-1443}:443
    env_file:
      - .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - inventree-app-data:/home/inventree/data:ro

volumes:
  inventree-data:
  inventree-app-data:

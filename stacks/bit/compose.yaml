services:
  app:
    image: sjdonado/bit
    container_name: bit
    environment:
      - ENV=production
      - DATABASE_URL=sqlite3://./sqlite/data.db
      - APP_URL=http://localhost:4000
      - ADMIN_NAME=Admin
      - ADMIN_API_KEY=changeme-generate-a-random-key
    ports:
      - "4000:4000"
    volumes:
      - sqlite_data:/app/sqlite

volumes:
  sqlite_data:

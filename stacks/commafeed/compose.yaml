services:
  commafeed:
    image: athou/commafeed:${COMMAFEED_TAG:-latest}
    container_name: commafeed
    restart: unless-stopped
    ports:
      - "${COMMAFEED_PORT:-8082}:8082"
    environment:
      - CF_DATABASE_DRIVERCLASS=org.postgresql.Driver
      - CF_DATABASE_URL=jdbc:postgresql://commafeed-db:5432/${POSTGRES_DB}
      - CF_DATABASE_USER=${POSTGRES_USER}
      - CF_DATABASE_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - commafeed_data:/commafeed/data
    depends_on:
      commafeed-db:
        condition: service_healthy

  commafeed-db:
    image: postgres:16-alpine
    container_name: commafeed-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - commafeed_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  commafeed_data:
  commafeed_db:

services:
  invoiceshelf:
    image: invoiceshelf/invoiceshelf:latest
    restart: unless-stopped
    ports:
      - "${INVOICESHELF_PORT:-8080}:80"
    environment:
      - APP_URL=${APP_URL:-http://localhost:8080}
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-invoiceshelf}
      - DB_USERNAME=${DB_USERNAME:-invoiceshelf}
      - DB_PASSWORD=${DB_PASSWORD:-changeme}
      - APP_KEY=${APP_KEY:-base64:changeme==}
      - SESSION_DOMAIN=${SESSION_DOMAIN:-localhost}
      - SANCTUM_STATEFUL_DOMAINS=${SANCTUM_STATEFUL_DOMAINS:-localhost}
    volumes:
      - invoiceshelf_data:/data
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      - MARIADB_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-rootchangeme}
      - MARIADB_USER=${DB_USERNAME:-invoiceshelf}
      - MARIADB_PASSWORD=${DB_PASSWORD:-changeme}
      - MARIADB_DATABASE=${DB_DATABASE:-invoiceshelf}
    volumes:
      - invoiceshelf_db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  invoiceshelf_data:
  invoiceshelf_db:

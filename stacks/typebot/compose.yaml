services:
  typebot-db:
    image: postgres:16
    container_name: typebot-db
    environment:
      POSTGRES_DB: typebot
      POSTGRES_USER: typebot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U typebot"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  typebot-redis:
    image: redis:7-alpine
    container_name: typebot-redis
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  typebot-builder:
    image: baptistearno/typebot-builder:latest
    container_name: typebot-builder
    ports:
      - "8080:3000"
    environment:
      DATABASE_URL: "postgresql://typebot:${POSTGRES_PASSWORD}@typebot-db:5432/typebot"
      REDIS_URL: "redis://typebot-redis:6379"
      NEXTAUTH_URL: "http://localhost:8080"
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET}
    depends_on:
      typebot-db:
        condition: service_healthy
      typebot-redis:
        condition: service_healthy
    restart: unless-stopped

  typebot-viewer:
    image: baptistearno/typebot-viewer:latest
    container_name: typebot-viewer
    ports:
      - "8081:3000"
    environment:
      DATABASE_URL: "postgresql://typebot:${POSTGRES_PASSWORD}@typebot-db:5432/typebot"
      REDIS_URL: "redis://typebot-redis:6379"
      NEXTAUTH_URL: "http://localhost:8080"
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET}
    depends_on:
      typebot-db:
        condition: service_healthy
      typebot-redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
  redis_data:

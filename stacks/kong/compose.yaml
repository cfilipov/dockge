services:
  kong:
    image: kong:${KONG_VERSION:-latest}
    restart: on-failure:5
    read_only: true
    ports:
      - "${KONG_PROXY_PORT:-8000}:8000/tcp"
      - "${KONG_SSL_PORT:-8443}:8443/tcp"
      - "${KONG_ADMIN_PORT:-8001}:8001/tcp"
      - "8444:8444/tcp"
      - "${KONG_ADMIN_GUI_PORT:-8002}:8002/tcp"
    environment:
      KONG_DATABASE: ${KONG_DATABASE:-postgres}
      KONG_PG_DATABASE: ${KONG_PG_DATABASE:-kong}
      KONG_PG_HOST: db
      KONG_PG_USER: ${KONG_PG_USER:-kong}
      KONG_PG_PASSWORD: ${KONG_PG_PASSWORD}
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_ADMIN_GUI_LISTEN: "0.0.0.0:8002"
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_PREFIX: /var/run/kong
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 10
    volumes:
      - kong-prefix:/var/run/kong
      - kong-tmp:/tmp
    security_opt:
      - no-new-privileges
    depends_on:
      db:
        condition: service_healthy
    networks:
      - kong-net

  kong-migrations:
    image: kong:${KONG_VERSION:-latest}
    command: kong migrations bootstrap
    environment:
      KONG_DATABASE: ${KONG_DATABASE:-postgres}
      KONG_PG_DATABASE: ${KONG_PG_DATABASE:-kong}
      KONG_PG_HOST: db
      KONG_PG_USER: ${KONG_PG_USER:-kong}
      KONG_PG_PASSWORD: ${KONG_PG_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure
    networks:
      - kong-net

  db:
    image: postgres:15
    restart: on-failure
    environment:
      POSTGRES_DB: ${KONG_PG_DATABASE:-kong}
      POSTGRES_USER: ${KONG_PG_USER:-kong}
      POSTGRES_PASSWORD: ${KONG_PG_PASSWORD}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${KONG_PG_DATABASE:-kong}", "-U", "${KONG_PG_USER:-kong}"]
      interval: 30s
      timeout: 30s
      retries: 3
    volumes:
      - kong-data:/var/lib/postgresql/data
    networks:
      - kong-net

networks:
  kong-net:

volumes:
  kong-data:
  kong-prefix:
    driver_opts:
      type: tmpfs
      device: tmpfs
  kong-tmp:
    driver_opts:
      type: tmpfs
      device: tmpfs

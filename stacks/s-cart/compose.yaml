services:
  app:
    image: php:8.3-apache
    ports:
      - "${APP_PORT:-8080}:80"
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: "3306"
      DB_DATABASE: ${DB_DATABASE:-scart}
      DB_USERNAME: ${DB_USERNAME:-scart}
      DB_PASSWORD: ${DB_PASSWORD:-scart}
      APP_URL: ${APP_URL:-http://localhost:8080}
    volumes:
      - app_data:/var/www/html

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_DATABASE:-scart}
      MYSQL_USER: ${DB_USERNAME:-scart}
      MYSQL_PASSWORD: ${DB_PASSWORD:-scart}
    volumes:
      - db_data:/var/lib/mysql

volumes:
  app_data:
  db_data:

services:
  # The main Indico container which runs flask
  # The same image is also used to run celery
  indico-web: &indico-web
    image: getindico/indico:latest
    command: /opt/indico/run_indico.sh
    depends_on:
      - indico-redis
      - indico-celery
    environment:
      - PGHOST=${PGHOST}
      - PGUSER=${PGUSER}
      - PGPASSWORD=${PGPASSWORD}
      - PGDATABASE=${PGDATABASE}
    networks:
      - backend
      - frontend
    ports:
      - "9090:59999"
    volumes:
      - archive:/opt/indico/archive
      - customization:/opt/indico/custom
      - static-files:/opt/indico/static-shared
      - indico-logs:/opt/indico/log
      - ./indico.conf:/opt/indico/etc/indico.conf:ro
      - ./logging.yaml:/opt/indico/etc/logging.yaml:ro
    tmpfs:
      - /opt/indico/tmp:mode=0777
  # Indico celery
  indico-celery: &indico-celery
    <<: *indico-web
    command: /opt/indico/run_celery.sh
    depends_on:
      - indico-redis
    networks:
      - backend
    ports: []
  # Indico celery beat
  indico-celery-beat:
    <<: *indico-celery
    command: /opt/indico/run_celery.sh beat
  # Redis
  indico-redis:
    image: redis
    networks:
      - backend
    volumes:
      - redis:/data
  # Postgres
  indico-postgres:
    image: postgres:15-bookworm
    environment:
      - POSTGRES_USER=${PGUSER}
      - POSTGRES_PASSWORD=${PGPASSWORD}
      - POSTGRES_DB=${PGDATABASE}
    networks:
      - backend
    volumes:
      - postgres-data:/var/lib/postgresql/data
  # Nginx proxy
  indico-nginx:
    image: ghcr.io/nginxinc/nginx-unprivileged:stable-alpine
    depends_on:
      - indico-web
    networks:
      - frontend
    ports:
      - "${NGINX_PORT:-8080}:8080"
    volumes:
      - static-files:/opt/indico/static:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres-data:
  archive:
  static-files:
  customization:
  indico-logs:
  redis:

networks:
  backend: {}
  frontend: {}

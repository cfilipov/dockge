volumes:
  db:

services:
  killbill:
    image: killbill/killbill:latest
    restart: unless-stopped
    ports:
      - "${KILLBILL_PORT:-8080}:8080"
    environment:
      - KILLBILL_DAO_URL=jdbc:mysql://db:3306/killbill
      - KILLBILL_DAO_USER=${KILLBILL_DB_USER:-root}
      - KILLBILL_DAO_PASSWORD=${KILLBILL_DB_PASSWORD:-killbill}
      - KILLBILL_METRICS_INFLUXDB=false
    depends_on:
      - db

  kaui:
    image: killbill/kaui:latest
    restart: unless-stopped
    ports:
      - "${KAUI_PORT:-9090}:8080"
    environment:
      - KAUI_CONFIG_DAO_URL=jdbc:mariadb://db:3306/kaui
      - KAUI_CONFIG_DAO_USER=${KILLBILL_DB_USER:-root}
      - KAUI_CONFIG_DAO_PASSWORD=${KILLBILL_DB_PASSWORD:-killbill}
      - KAUI_KILLBILL_URL=http://killbill:8080
      - KAUI_KILLBILL_API_KEY=${KAUI_API_KEY:-bob}
      - KAUI_KILLBILL_API_SECRET=${KAUI_API_SECRET:-lazar}
    depends_on:
      - killbill

  db:
    image: killbill/mariadb:0.24
    restart: unless-stopped
    volumes:
      - db:/var/lib/mysql
    expose:
      - "3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${KILLBILL_DB_PASSWORD:-killbill}

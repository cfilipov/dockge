services:
  hoppscotch:
    image: hoppscotch/hoppscotch:latest
    restart: unless-stopped
    ports:
      - "${HOPPSCOTCH_PORT:-3000}:3000"
      - "${HOPPSCOTCH_ADMIN_PORT:-3100}:3100"
      - "${HOPPSCOTCH_API_PORT:-3170}:3170"
      - "${HOPPSCOTCH_WEBAPP_PORT:-3200}:3200"
      - "${HOPPSCOTCH_PROXY_PORT:-3080}:80"
    environment:
      DATABASE_URL: "postgresql://${PG_USER}:${PG_PASSWORD}@db:5432/${PG_DATABASE}?connect_timeout=300"
      TOKEN_SALT_COMPLEXITY: "10"
      MAGIC_LINK_TOKEN_VALIDITY: "3"
      REFRESH_TOKEN_VALIDITY: "604800000"
      ACCESS_TOKEN_VALIDITY: "86400000"
      SESSION_SECRET: ${SESSION_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      REDIRECT_URL: "http://localhost:3000"
      WHITELISTED_ORIGINS: "http://localhost:3170,http://localhost:3000,http://localhost:3100"
      VITE_ALLOWED_AUTH_PROVIDERS: "EMAIL"
      MAILER_SMTP_ENABLE: "false"
      RATE_LIMIT_TTL: "60"
      RATE_LIMIT_MAX: "100"
      VITE_APP_TOS_LINK: "https://docs.hoppscotch.io/support/terms"
      VITE_APP_PRIVACY_POLICY_LINK: "https://docs.hoppscotch.io/support/privacy"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DATABASE}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data

volumes:
  pg-data:

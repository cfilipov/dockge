# Odoo - Open source business apps suite
# Based on: https://hub.docker.com/_/odoo (official Docker library image)
# Docs: https://www.odoo.com/documentation

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-odoo}
      POSTGRES_DB: postgres
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped

  odoo:
    image: odoo:18
    depends_on:
      - db
    environment:
      HOST: db
      PORT: "5432"
      USER: odoo
      PASSWORD: ${POSTGRES_PASSWORD:-odoo}
    ports:
      - "8069:8069"
    volumes:
      - odoo-data:/var/lib/odoo
      - odoo-addons:/mnt/extra-addons
    restart: unless-stopped

volumes:
  db-data:
  odoo-data:
  odoo-addons:

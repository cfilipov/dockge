services:
  web:
    image: instructure/canvas-lms:stable
    container_name: canvas-lms
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-3000}:3000"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=${POSTGRES_USER:-canvas}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-canvas}
      - REDIS_URL=redis://redis:6379/1
      - RAILS_ENV=production
      - CANVAS_LMS_ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - CANVAS_LMS_ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
      - CANVAS_LMS_ACCOUNT_NAME=${ACCOUNT_NAME:-Canvas}
      - CANVAS_LMS_STATS_COLLECTION=opt_out
      - SECRET_KEY_BASE=${SECRET_KEY_BASE:-supersecretkey}
    volumes:
      - canvas_data:/var/lib/canvas
      - canvas_tmp:/tmp
    depends_on:
      - postgres
      - redis

  jobs:
    image: instructure/canvas-lms:stable
    container_name: canvas-jobs
    restart: unless-stopped
    command: bundle exec script/delayed_job run
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=${POSTGRES_USER:-canvas}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-canvas}
      - REDIS_URL=redis://redis:6379/1
      - RAILS_ENV=production
    volumes:
      - canvas_data:/var/lib/canvas
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15-alpine
    container_name: canvas-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-canvas}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-canvas}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: canvas-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  canvas_data:
  canvas_tmp:
  postgres_data:
  redis_data:

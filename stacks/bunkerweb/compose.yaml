services:
  bunkerweb:
    image: bunkerity/bunkerweb:${BUNKERWEB_VERSION:-latest}
    container_name: bunkerweb
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:8080"
      - "${HTTPS_PORT:-443}:8443"
    volumes:
      - bw_data:/data
      - ./www:/var/www/html:ro
    environment:
      - SERVER_NAME=${SERVER_NAME:-localhost}
      - AUTO_LETS_ENCRYPT=${AUTO_LETS_ENCRYPT:-no}
      - USE_REVERSE_PROXY=${USE_REVERSE_PROXY:-no}
      - REVERSE_PROXY_URL=${REVERSE_PROXY_URL:-/}
      - REVERSE_PROXY_HOST=${REVERSE_PROXY_HOST:-http://app:8080}
      - API_WHITELIST_IP=${API_WHITELIST_IP:-127.0.0.0/8 10.20.30.0/24}
    networks:
      - bw-net

  bw-scheduler:
    image: bunkerity/bunkerweb-scheduler:${BUNKERWEB_VERSION:-latest}
    container_name: bw-scheduler
    restart: unless-stopped
    depends_on:
      - bunkerweb
    volumes:
      - bw_data:/data
    environment:
      - DOCKER_HOST=tcp://bw-docker-proxy:2375
    networks:
      - bw-net

  bw-docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: bw-docker-proxy
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - CONTAINERS=1
      - LOG_LEVEL=warning
    networks:
      - bw-net

volumes:
  bw_data:

networks:
  bw-net:
    name: bw-net

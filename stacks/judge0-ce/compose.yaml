services:
  server:
    image: judge0/judge0:latest
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    ports:
      - "${PORT}:2358"
    privileged: true
    restart: always
    depends_on:
      - db
      - redis

  worker:
    image: judge0/judge0:latest
    command: ["./scripts/workers"]
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    privileged: true
    restart: always
    depends_on:
      - db
      - redis

  db:
    image: postgres:16.2
    env_file: judge0.conf
    volumes:
      - judge0-db-data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7.2.4
    command:
      - bash
      - -c
      - 'docker-entrypoint.sh --appendonly no --requirepass "$$REDIS_PASSWORD"'
    env_file: judge0.conf
    restart: always

volumes:
  judge0-db-data:

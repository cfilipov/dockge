services:
  postgres:
    image: postgres:17
    container_name: druid-postgres
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=druid
      - POSTGRES_DB=druid
    volumes:
      - metadata-data:/var/lib/postgresql/data
    restart: unless-stopped

  zookeeper:
    image: zookeeper:3.5.10
    container_name: druid-zookeeper
    ports:
      - "2181:2181"
    environment:
      - ZOO_MY_ID=1
    volumes:
      - zookeeper-data:/data
    restart: unless-stopped

  coordinator:
    image: apache/druid:31.0.1
    container_name: druid-coordinator
    ports:
      - "8081:8081"
    command:
      - coordinator
    env_file:
      - environment
    volumes:
      - druid-shared:/opt/shared
      - coordinator-var:/opt/druid/var
    depends_on:
      - zookeeper
      - postgres
    restart: unless-stopped

  broker:
    image: apache/druid:31.0.1
    container_name: druid-broker
    ports:
      - "8082:8082"
    command:
      - broker
    env_file:
      - environment
    volumes:
      - broker-var:/opt/druid/var
    depends_on:
      - zookeeper
      - postgres
      - coordinator
    restart: unless-stopped

  historical:
    image: apache/druid:31.0.1
    container_name: druid-historical
    ports:
      - "8083:8083"
    command:
      - historical
    env_file:
      - environment
    volumes:
      - druid-shared:/opt/shared
      - historical-var:/opt/druid/var
    depends_on:
      - zookeeper
      - postgres
      - coordinator
    restart: unless-stopped

  middlemanager:
    image: apache/druid:31.0.1
    container_name: druid-middlemanager
    ports:
      - "8091:8091"
      - "8100-8105:8100-8105"
    command:
      - middleManager
    env_file:
      - environment
    volumes:
      - druid-shared:/opt/shared
      - middlemanager-var:/opt/druid/var
    depends_on:
      - zookeeper
      - postgres
      - coordinator
    restart: unless-stopped

  router:
    image: apache/druid:31.0.1
    container_name: druid-router
    ports:
      - "8888:8888"
    command:
      - router
    env_file:
      - environment
    volumes:
      - router-var:/opt/druid/var
    depends_on:
      - zookeeper
      - postgres
      - coordinator
    restart: unless-stopped

volumes:
  metadata-data:
  zookeeper-data:
  druid-shared:
  coordinator-var:
  broker-var:
  historical-var:
  middlemanager-var:
  router-var:

services:
  omeka:
    image: omeka/omeka-s:latest
    ports:
      - "8080:80"
    volumes:
      - ./config:/config
      - files:/var/www/html/files
    environment:
      OMEKA_DB_HOST: db
      OMEKA_DB_NAME: omeka
      OMEKA_DB_USER: omeka
      OMEKA_DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mariadb:11
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: omeka
      MYSQL_USER: omeka
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  db_data:
  files:

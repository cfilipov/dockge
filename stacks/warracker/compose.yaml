services:
  warracker:
    image: ghcr.io/sassanix/warracker/main:latest
    restart: unless-stopped
    ports:
      - "${WARRACKER_PORT:-8005}:80"
    volumes:
      - warracker_uploads:/data/uploads
    environment:
      - DB_HOST=warrackerdb
      - DB_PORT=5432
      - DB_NAME=warranty_db
      - DB_USER=warranty_user
      - DB_PASSWORD=${DB_PASSWORD:-warranty_password}
      - SMTP_HOST=${SMTP_HOST:-smtp.example.com}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_USERNAME=${SMTP_USERNAME:-notifications@example.com}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SECRET_KEY=${SECRET_KEY:-your_strong_secret_key_here}
      - MAX_UPLOAD_MB=${MAX_UPLOAD_MB:-32}
      - NGINX_MAX_BODY_SIZE_VALUE=${NGINX_MAX_BODY_SIZE_VALUE:-32M}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:8005}
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:8005}
      - WARRACKER_MEMORY_MODE=${WARRACKER_MEMORY_MODE:-optimized}
      - PYTHONUNBUFFERED=1
    depends_on:
      warrackerdb:
        condition: service_healthy

  warrackerdb:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=warranty_db
      - POSTGRES_USER=warranty_user
      - POSTGRES_PASSWORD=${DB_PASSWORD:-warranty_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  warracker_uploads:

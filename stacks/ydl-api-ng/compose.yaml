services:
  ydl_api_ng:
    image: totonyus/ydl_api_ng:latest
    container_name: ydl_api_ng
    restart: unless-stopped
    depends_on:
      - ydl_api_ng_redis
    ports:
      - "${YDL_PORT}:80"
    volumes:
      - ./params:/app/params
      - ./logs:/app/logs
      - ${DOWNLOADS_DIR}:/app/downloads
      - ./data:/app/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      - UID=${PUID}
      - GID=${PGID}
      - NB_WORKERS=${NB_WORKERS}
      - LOG_LEVEL=${LOG_LEVEL}
      - DISABLE_REDIS=${DISABLE_REDIS}
    networks:
      - ydl_api_ng

  ydl_api_ng_redis:
    image: redis:latest
    container_name: ydl_api_ng_redis
    restart: unless-stopped
    networks:
      - ydl_api_ng
    volumes:
      - /etc/localtime:/etc/localtime:ro

networks:
  ydl_api_ng:

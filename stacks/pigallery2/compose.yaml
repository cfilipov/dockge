services:
  pigallery2:
    image: bpatrik/pigallery2:latest
    container_name: pigallery2
    restart: unless-stopped
    ports:
      - "${PIGALLERY2_PORT:-80}:80"
    environment:
      NODE_ENV: production
    volumes:
      - ${PHOTOS_DIR:-./photos}:/app/data/images:ro
      - pigallery2-config:/app/data/config
      - pigallery2-db:/app/data/db
      - pigallery2-tmp:/app/data/tmp

volumes:
  pigallery2-config:
  pigallery2-db:
  pigallery2-tmp:

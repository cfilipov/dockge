services:
  digiwall:
    image: ladigitale/digiwall:${DIGIWALL_VERSION:-latest}
    container_name: digiwall
    restart: unless-stopped
    ports:
      - "${DIGIWALL_PORT:-8080}:8080"
    environment:
      NODE_ENV: production
    volumes:
      - digiwall_data:/app/data

volumes:
  digiwall_data:

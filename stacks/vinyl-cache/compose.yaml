services:
  varnish:
    image: wodby/varnish:${VARNISH_VERSION:-6}
    container_name: vinyl-cache
    restart: unless-stopped
    ports:
      - "${VARNISH_PORT:-6081}:6081"
    environment:
      - VARNISH_BACKEND_HOST=${BACKEND_HOST:-backend}
      - VARNISH_BACKEND_PORT=${BACKEND_PORT:-80}
      - VARNISH_MEMORY=${VARNISH_MEMORY:-256m}
    depends_on:
      - backend

  backend:
    image: nginx:alpine
    container_name: vinyl-backend
    restart: unless-stopped
    volumes:
      - ./html:/usr/share/nginx/html:ro

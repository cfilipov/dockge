services:
  multi-scrobbler:
    image: foxxmd/multi-scrobbler:latest
    container_name: multi-scrobbler
    environment:
      - TZ=${TZ:-Etc/UTC}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    ports:
      - "${PORT:-9078}:9078"
    volumes:
      - ${CONFIG_DIR:-./config}:/config
    restart: unless-stopped

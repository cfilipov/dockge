services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - minio-data:/data

  gotrue:
    image: appflowyinc/gotrue:${GOTRUE_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GOTRUE_ADMIN_EMAIL: ${GOTRUE_ADMIN_EMAIL}
      GOTRUE_ADMIN_PASSWORD: ${GOTRUE_ADMIN_PASSWORD}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: ${JWT_EXP}
      GOTRUE_DB_DRIVER: postgres
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      API_EXTERNAL_URL: ${BASE_URL}
      PORT: "9999"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:9999/health"]
      interval: 5s
      timeout: 5s
      retries: 12

  appflowy_cloud:
    image: appflowyinc/appflowy_cloud:${CLOUD_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      gotrue:
        condition: service_healthy
    environment:
      RUST_LOG: info
      APPFLOWY_ENVIRONMENT: production
      APPFLOWY_DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      APPFLOWY_REDIS_URI: redis://redis:6379
      APPFLOWY_GOTRUE_JWT_SECRET: ${JWT_SECRET}
      APPFLOWY_GOTRUE_BASE_URL: http://gotrue:9999
      APPFLOWY_S3_USE_MINIO: "true"
      APPFLOWY_S3_MINIO_URL: http://minio:9000
      APPFLOWY_S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      APPFLOWY_S3_SECRET_KEY: ${S3_SECRET_KEY}
      APPFLOWY_S3_BUCKET: ${S3_BUCKET}
      APPFLOWY_S3_REGION: ${S3_REGION}
      APPFLOWY_S3_CREATE_BUCKET: "true"
      APPFLOWY_ACCESS_CONTROL: "true"
      APPFLOWY_BASE_URL: ${BASE_URL}
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:8000/api/health"]
      interval: 5s
      timeout: 5s
      retries: 12

  admin_frontend:
    image: appflowyinc/admin_frontend:${ADMIN_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      appflowy_cloud:
        condition: service_healthy
    environment:
      APPFLOWY_GOTRUE_BASE_URL: ${BASE_URL}/gotrue
      APPFLOWY_BASE_URL: ${BASE_URL}

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      appflowy_cloud:
        condition: service_healthy

volumes:
  postgres-data:
  minio-data:

services:
  local-deep-research:
    image: localdeepresearch/local-deep-research:latest
    networks:
      - ldr-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5000:5000"
    environment:
      - LDR_WEB_HOST=0.0.0.0
      - LDR_WEB_PORT=5000
      - LDR_DATA_DIR=/data
      - LDR_LLM_OLLAMA_URL=http://ollama:11434
      - LDR_SEARCH_ENGINE_WEB_SEARXNG_DEFAULT_PARAMS_INSTANCE_URL=http://searxng:8080
    volumes:
      - ldr_data:/data
      - ldr_scripts:/scripts
    ulimits:
      memlock:
        soft: -1
        hard: -1
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - DAC_OVERRIDE
      - SETUID
      - SETGID
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
      searxng:
        condition: service_started

  ollama:
    image: ollama/ollama:latest
    container_name: ollama_service
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      start_period: 10m
      retries: 2
    environment:
      OLLAMA_KEEP_ALIVE: "30m"
    volumes:
      - ollama_data:/root/.ollama
      - ldr_scripts:/scripts
    networks:
      - ldr-network
    security_opt:
      - "no-new-privileges:true"
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    networks:
      - ldr-network
    volumes:
      - searxng_data:/etc/searxng
    restart: unless-stopped

volumes:
  ldr_data:
  ldr_scripts:
  ollama_data:
  searxng_data:

networks:
  ldr-network:

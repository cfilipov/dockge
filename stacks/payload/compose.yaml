services:
  payload:
    image: node:22-alpine
    working_dir: /app
    command: ["node", "server.js"]
    ports:
      - "3000:3000"
    environment:
      DATABASE_URI: mongodb://mongo:27017/payload
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      PAYLOAD_PUBLIC_SERVER_URL: http://localhost:3000
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:

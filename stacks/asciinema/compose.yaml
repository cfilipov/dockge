services:
  asciinema:
    image: ghcr.io/asciinema/asciinema-server:latest
    container_name: asciinema
    ports:
      - "${PORT:-4000}:4000"
    volumes:
      - asciinema_data:/var/opt/asciinema
    environment:
      - URL_HOST=${URL_HOST:-localhost}
      - URL_SCHEME=${URL_SCHEME:-http}
      - URL_PORT=${URL_PORT:-4000}
      - SECRET_KEY_BASE=${SECRET_KEY_BASE:-changeme_generate_a_long_random_secret_key_base}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    volumes:
      - asciinema_db:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-asciinema}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-asciinema_secret}
      - POSTGRES_DB=${POSTGRES_DB:-asciinema}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-asciinema}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  asciinema_data:
  asciinema_db:

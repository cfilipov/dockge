services:
  bitpoll:
    image: ghcr.io/fsinfuhh/bitpoll:latest
    ports:
      - "${BITPOLL_PORT:-3008}:3008"
    volumes:
      - bitpoll_static:/opt/static
      - ./config:/opt/config
      - bitpoll_logs:/opt/log
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      - db
    restart: unless-stopped

  web:
    image: nginx:1.27
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - bitpoll_static:/opt/static:ro
    ports:
      - "${NGINX_PORT:-8080}:80"
    depends_on:
      - bitpoll
    restart: unless-stopped

  db:
    image: postgres:16
    volumes:
      - bitpoll_db:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    restart: unless-stopped

volumes:
  bitpoll_static:
  bitpoll_logs:
  bitpoll_db:

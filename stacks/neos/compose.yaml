services:
  neos:
    image: php:8.2-apache
    container_name: neos
    ports:
      - "8080:80"
    depends_on:
      - mysql
    volumes:
      - neos_data:/var/www/html
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: neos-mysql
    environment:
      MYSQL_DATABASE: neos
      MYSQL_USER: neos
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  neos_data:
  mysql_data:

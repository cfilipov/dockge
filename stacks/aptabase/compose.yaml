services:
  aptabase:
    image: ghcr.io/aptabase/aptabase:main
    container_name: aptabase
    ports:
      - "8000:8000"
    environment:
      - BASE_URL=http://localhost:8000
      - AUTH_SECRET=${AUTH_SECRET}
      - DATABASE_URL=Server=aptabase_db;Port=5432;User Id=aptabase;Password=${DB_PASSWORD};Database=aptabase
      - CLICKHOUSE_URL=Host=aptabase_events_db;Port=8123;Username=aptabase;Password=${DB_PASSWORD}
    depends_on:
      - aptabase_db
      - aptabase_events_db
    restart: unless-stopped

  aptabase_db:
    image: postgres:15-alpine
    container_name: aptabase_db
    environment:
      - POSTGRES_USER=aptabase
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=aptabase
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped

  aptabase_events_db:
    image: clickhouse/clickhouse-server:23.8.4.69-alpine
    container_name: aptabase_events_db
    environment:
      - CLICKHOUSE_USER=aptabase
      - CLICKHOUSE_PASSWORD=${DB_PASSWORD}
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - events-db-data:/var/lib/clickhouse
    restart: unless-stopped

volumes:
  db-data:
  events-db-data:

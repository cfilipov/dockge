services:
  postiz:
    image: ghcr.io/gitroomhq/postiz-app:latest
    container_name: postiz
    ports:
      - "4007:4007"
    environment:
      - DATABASE_URL=postgresql://postiz:${DB_PASSWORD}@postiz-postgres:5432/postiz
      - REDIS_URL=redis://postiz-redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=http://localhost:4007
      - BACKEND_INTERNAL_URL=http://localhost:3000
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:4007/api
    depends_on:
      - postiz-postgres
      - postiz-redis
    networks:
      - postiz
    restart: unless-stopped

  postiz-postgres:
    image: postgres:17-alpine
    container_name: postiz-postgres
    environment:
      - POSTGRES_USER=postiz
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=postiz
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - postiz
    restart: unless-stopped

  postiz-redis:
    image: redis:7.2-alpine
    container_name: postiz-redis
    volumes:
      - redis-data:/data
    networks:
      - postiz
    restart: unless-stopped

  temporal:
    image: temporalio/auto-setup:latest
    container_name: postiz-temporal
    ports:
      - "7233:7233"
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=${DB_PASSWORD}
      - POSTGRES_SEEDS=temporal-postgresql
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
      - ENABLE_ES=true
      - ES_SEEDS=temporal-elasticsearch
      - ES_VERSION=v7
    depends_on:
      - temporal-postgresql
      - temporal-elasticsearch
    networks:
      - temporal
    restart: unless-stopped

  temporal-postgresql:
    image: postgres:16-alpine
    container_name: postiz-temporal-postgres
    environment:
      - POSTGRES_USER=temporal
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - temporal-postgres-data:/var/lib/postgresql/data
    networks:
      - temporal
    restart: unless-stopped

  temporal-elasticsearch:
    image: elasticsearch:7.17.27
    container_name: postiz-temporal-es
    environment:
      - cluster.routing.allocation.disk.threshold_enabled=true
      - cluster.routing.allocation.disk.watermark.low=512mb
      - cluster.routing.allocation.disk.watermark.high=256mb
      - cluster.routing.allocation.disk.watermark.flood_stage=128mb
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - xpack.security.enabled=false
    volumes:
      - temporal-es-data:/usr/share/elasticsearch/data
    networks:
      - temporal
    restart: unless-stopped

  temporal-ui:
    image: temporalio/ui:latest
    container_name: postiz-temporal-ui
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    depends_on:
      - temporal
    networks:
      - temporal
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  temporal-postgres-data:
  temporal-es-data:

networks:
  postiz:
  temporal:

services:
  web:
    image: mediacms/mediacms:latest
    container_name: mediacms-web
    restart: unless-stopped
    ports:
      - "${MEDIACMS_PORT:-80}:80"
    volumes:
      - mediacms-data:/home/mediacms.io/mediacms/
    environment:
      - ENABLE_CELERY_BEAT=no
      - ENABLE_CELERY_SHORT=no
      - ENABLE_CELERY_LONG=no
      - ENABLE_MIGRATIONS=no
    depends_on:
      - migrations

  migrations:
    image: mediacms/mediacms:latest
    container_name: mediacms-migrations
    restart: on-failure
    volumes:
      - mediacms-data:/home/mediacms.io/mediacms/
    environment:
      - ENABLE_UWSGI=no
      - ENABLE_NGINX=no
      - ENABLE_CELERY_SHORT=no
      - ENABLE_CELERY_LONG=no
      - ENABLE_CELERY_BEAT=no
      - ADMIN_USER=${ADMIN_USER}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    command: "./deploy/docker/prestart.sh"
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

  celery-beat:
    image: mediacms/mediacms:latest
    container_name: mediacms-celery-beat
    restart: unless-stopped
    volumes:
      - mediacms-data:/home/mediacms.io/mediacms/
    environment:
      - ENABLE_UWSGI=no
      - ENABLE_NGINX=no
      - ENABLE_CELERY_SHORT=no
      - ENABLE_CELERY_LONG=no
      - ENABLE_MIGRATIONS=no
    depends_on:
      - redis

  celery-worker:
    image: mediacms/mediacms:latest
    container_name: mediacms-celery-worker
    restart: unless-stopped
    volumes:
      - mediacms-data:/home/mediacms.io/mediacms/
    environment:
      - ENABLE_UWSGI=no
      - ENABLE_NGINX=no
      - ENABLE_CELERY_BEAT=no
      - ENABLE_MIGRATIONS=no
    depends_on:
      - migrations

  db:
    image: postgres:17-alpine
    container_name: mediacms-db
    restart: always
    volumes:
      - mediacms-db:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - TZ=${TZ}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: mediacms-redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  mediacms-data:
  mediacms-db:

services:
  gladys:
    image: gladysassistant/gladys:${GLADYS_VERSION:-v4}
    container_name: gladys
    restart: unless-stopped
    privileged: true
    network_mode: host
    volumes:
      - gladys-data:/var/lib/gladysassistant
      - /dev:/dev
      - /run/udev:/run/udev:ro
    environment:
      NODE_ENV: production
      SERVER_PORT: ${GLADYS_PORT:-80}
      TZ: ${TZ:-UTC}
      SQLITE_FILE_PATH: /var/lib/gladysassistant/gladys-production.db

volumes:
  gladys-data:

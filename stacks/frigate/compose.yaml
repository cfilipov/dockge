services:
  frigate:
    container_name: frigate
    privileged: true
    restart: unless-stopped
    stop_grace_period: 30s
    image: ghcr.io/blakeblackshear/frigate:stable
    shm_size: "512mb"
    # devices:
    #   - /dev/bus/usb:/dev/bus/usb # Google Coral USB
    #   - /dev/apex_0:/dev/apex_0 # Google Coral PCIe
    #   - /dev/video11:/dev/video11 # V4L2
    #   - /dev/dri/renderD128:/dev/dri/renderD128 # Intel hwaccel
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./config:/config
      - ./storage:/media/frigate
      - type: tmpfs
        target: /tmp/cache
        tmpfs:
          size: 1000000000
    ports:
      - "8971:8971"
      - "8554:8554"
      - "8555:8555/tcp"
      - "8555:8555/udp"
    environment:
      FRIGATE_RTSP_PASSWORD: "password"

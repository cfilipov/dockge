services:
  db:
    image: mysql:8.4
    restart: always
    container_name: myfin-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-myfinrootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-myfin}
      MYSQL_USER: ${MYSQL_USER:-myfin}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-myfinpassword}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 5

  myfin-api:
    image: ghcr.io/afaneca/myfin-api:latest
    container_name: myfin-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3001}:3001"
    environment:
      - DB_NAME=${MYSQL_DATABASE:-myfin}
      - DB_USER=${MYSQL_USER:-myfin}
      - DB_PW=${MYSQL_PASSWORD:-myfinpassword}
      - DB_PORT=3306
      - DB_HOST=db
      - PORT=3001
      - LOGGING=false
      - BYPASS_SESSION_CHECK=false
      - ENABLE_USER_SIGNUP=${ENABLE_USER_SIGNUP:-false}
      - TRUST_PROXY=1
    depends_on:
      db:
        condition: service_healthy

  myfin-frontend:
    image: ghcr.io/afaneca/myfin:latest
    container_name: myfin-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8181}:80"
    depends_on:
      - myfin-api
    environment:
      - VITE_MYFIN_BASE_API_URL=${MYFIN_API_URL:-http://localhost:3001}

volumes:
  db_data:

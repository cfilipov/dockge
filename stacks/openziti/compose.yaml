services:
  ziti-controller:
    image: openziti/quickstart:${ZITI_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "${ZITI_CTRL_EDGE_PORT:-1280}:${ZITI_CTRL_EDGE_PORT:-1280}"
      - "${ZITI_CTRL_PORT:-6262}:${ZITI_CTRL_PORT:-6262}"
    environment:
      ZITI_CTRL_NAME: ${ZITI_CTRL_NAME:-ziti-edge-controller}
      ZITI_CTRL_EDGE_ADVERTISED_ADDRESS: ${ZITI_CTRL_EDGE_ADVERTISED_ADDRESS:-ziti-edge-controller}
      ZITI_CTRL_EDGE_ADVERTISED_PORT: ${ZITI_CTRL_EDGE_PORT:-1280}
      ZITI_CTRL_ADVERTISED_PORT: ${ZITI_CTRL_PORT:-6262}
      ZITI_USER: ${ZITI_USER:-admin}
      ZITI_PWD: ${ZITI_PWD:-admin}
    volumes:
      - ziti_data:/persistent
    networks:
      ziti:
        aliases:
          - ziti-edge-controller
    healthcheck:
      test: curl -m 1 -s -k https://ziti-edge-controller:${ZITI_CTRL_EDGE_PORT:-1280}/edge/client/v1/version
      interval: 5s
      timeout: 3s
      retries: 30
    entrypoint:
      - "/var/openziti/scripts/run-controller.sh"

  ziti-edge-router:
    image: openziti/quickstart:${ZITI_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "${ZITI_ROUTER_PORT:-3022}:${ZITI_ROUTER_PORT:-3022}"
      - "${ZITI_ROUTER_LISTENER_PORT:-10080}:${ZITI_ROUTER_LISTENER_PORT:-10080}"
    environment:
      ZITI_CTRL_ADVERTISED_ADDRESS: ziti-controller
      ZITI_CTRL_ADVERTISED_PORT: ${ZITI_CTRL_PORT:-6262}
      ZITI_CTRL_EDGE_ADVERTISED_ADDRESS: ziti-edge-controller
      ZITI_CTRL_EDGE_ADVERTISED_PORT: ${ZITI_CTRL_EDGE_PORT:-1280}
      ZITI_ROUTER_NAME: ${ZITI_ROUTER_NAME:-ziti-edge-router}
      ZITI_ROUTER_ADVERTISED_ADDRESS: ${ZITI_ROUTER_ADVERTISED_ADDRESS:-ziti-edge-router}
      ZITI_ROUTER_PORT: ${ZITI_ROUTER_PORT:-3022}
      ZITI_ROUTER_LISTENER_BIND_PORT: ${ZITI_ROUTER_LISTENER_PORT:-10080}
      ZITI_ROUTER_ROLES: public
    volumes:
      - ziti_data:/persistent
    networks:
      ziti:
        aliases:
          - ziti-edge-router
    depends_on:
      ziti-controller:
        condition: service_healthy

  ziti-console:
    image: openziti/zac:latest
    restart: unless-stopped
    ports:
      - "${ZAC_PORT:-8443}:8443"
    environment:
      ZAC_SERVER_CERT_CHAIN: /persistent/pki/ziti-edge-controller-intermediate/certs/ziti-edge-controller-server.cert
      ZAC_SERVER_KEY: /persistent/pki/ziti-edge-controller-intermediate/keys/ziti-edge-controller-server.key
      ZITI_CTRL_EDGE_ADVERTISED_ADDRESS: ziti-edge-controller
      ZITI_CTRL_EDGE_ADVERTISED_PORT: ${ZITI_CTRL_EDGE_PORT:-1280}
      PORTTLS: 8443
    volumes:
      - ziti_data:/persistent
    networks:
      - ziti
    depends_on:
      ziti-controller:
        condition: service_healthy

networks:
  ziti:
    driver: bridge

volumes:
  ziti_data:

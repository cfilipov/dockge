services:
  openolat:
    image: frentix/openolat:${OPENOLAT_VERSION:-19.1.6}
    container_name: openolat
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:8080"
    environment:
      - DB_HOST=postgres
      - DB_USER=${DB_USER:-openolat}
      - DB_PASS=${DB_PASSWORD:-changeme}
      - DB_NAME=${DB_NAME:-openolat}
      - ADMIN_USER=${ADMIN_USER:-administrator}
      - ADMIN_PASS=${ADMIN_PASSWORD:-changeme}
      - OLAT_SERVER_URL=${OLAT_URL:-http://localhost:8080}
    volumes:
      - olatdata:/opt/openolat/olatdata
    depends_on:
      - postgres

  postgres:
    image: postgres:15-alpine
    container_name: openolat-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER:-openolat}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-changeme}
      - POSTGRES_DB=${DB_NAME:-openolat}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  olatdata:
  postgres_data:

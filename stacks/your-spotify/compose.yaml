services:
  your-spotify-server:
    image: yooooomi/your_spotify_server:latest
    container_name: your-spotify-server
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      - API_ENDPOINT=${API_ENDPOINT:-http://localhost:8080}
      - CLIENT_ENDPOINT=${CLIENT_ENDPOINT:-http://localhost:3000}
      - SPOTIFY_PUBLIC=${SPOTIFY_PUBLIC:-your_spotify_client_id}
      - SPOTIFY_SECRET=${SPOTIFY_SECRET:-your_spotify_client_secret}
      - MONGO_ENDPOINT=mongodb://your-spotify-mongo:27017/your_spotify
      - CORS=${CORS:-http://localhost:3000}
    depends_on:
      - your-spotify-mongo
    restart: unless-stopped

  your-spotify-client:
    image: yooooomi/your_spotify_client:latest
    container_name: your-spotify-client
    ports:
      - "${CLIENT_PORT:-3000}:3000"
    environment:
      - API_ENDPOINT=${API_ENDPOINT:-http://localhost:8080}
    restart: unless-stopped

  your-spotify-mongo:
    image: mongo:7
    container_name: your-spotify-mongo
    volumes:
      - your-spotify-mongo-data:/data/db
    restart: unless-stopped

volumes:
  your-spotify-mongo-data:

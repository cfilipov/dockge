services:
  chibisafe:
    image: chibisafe/chibisafe:latest
    container_name: chibisafe
    restart: unless-stopped
    ports:
      - "${CHIBISAFE_PORT:-8000}:8000"
    volumes:
      - uploads:/app/uploads
      - database:/app/database
    environment:
      BASE_API_URL: ${BASE_API_URL:-http://localhost:8000}

volumes:
  uploads:
  database:

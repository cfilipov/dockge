services:
  mopidy:
    image: wernight/mopidy:latest
    container_name: mopidy
    ports:
      - "${HTTP_PORT:-6680}:6680"
      - "${MPD_PORT:-6600}:6600"
    volumes:
      - ${MUSIC_DIR:-./music}:/var/lib/mopidy/media:ro
      - ${DATA_DIR:-./data}:/var/lib/mopidy/local
      - ./mopidy.conf:/etc/mopidy/mopidy.conf:ro
    restart: unless-stopped

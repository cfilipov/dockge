[core]
cache_dir = /var/lib/mopidy/cache
config_dir = /etc/mopidy
data_dir = /var/lib/mopidy/local

[logging]
verbosity = 0

[local]
media_dir = /var/lib/mopidy/media

[audio]
output = autoaudiosink

[http]
enabled = true
hostname = 0.0.0.0
port = 6680

[mpd]
enabled = true
hostname = 0.0.0.0
port = 6600

services:
  movim:
    image: movim/movim:latest
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - db
    environment:
      MOVIM_DOMAIN: ${MOVIM_DOMAIN}
      MOVIM_PORT: "443"
      MOVIM_ADMIN: ${ADMIN_JID}
      DB_DRIVER: pgsql
      DB_HOST: db
      DB_PORT: "5432"
      DB_DATABASE: movim
      DB_USERNAME: movim
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - movim-data:/var/www/movim/public

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: movim
      POSTGRES_USER: movim
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  movim-data:
  db-data:

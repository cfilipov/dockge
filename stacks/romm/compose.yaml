services:
  romm:
    image: rommapp/romm:latest
    container_name: romm
    restart: unless-stopped
    ports:
      - "${PORT:-80}:8080"
    volumes:
      - romm-resources:/romm/resources
      - romm-redis-data:/redis-data
      - ${LIBRARY_PATH:-./library}:/romm/library
      - ${ASSETS_PATH:-./assets}:/romm/assets
      - ./config:/romm/config
    environment:
      DB_HOST: romm-db
      DB_NAME: ${DB_NAME:-romm}
      DB_USER: ${DB_USER:-romm-user}
      DB_PASSWD: ${DB_PASSWORD:-rommpass}
      ROMM_AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:-change_me_generate_with_openssl}
      HASHEOUS_API_ENABLED: "true"
    depends_on:
      romm-db:
        condition: service_healthy

  romm-db:
    image: mariadb:latest
    container_name: romm-db
    restart: unless-stopped
    volumes:
      - mysql-data:/var/lib/mysql
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MARIADB_DATABASE: ${DB_NAME:-romm}
      MARIADB_USER: ${DB_USER:-romm-user}
      MARIADB_PASSWORD: ${DB_PASSWORD:-rommpass}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 30s
      start_interval: 10s
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  romm-resources:
  romm-redis-data:
  mysql-data:

services:
  client:
    image: rssmonster/client:latest
    container_name: rssmonster-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "${CLIENT_PORT:-8080}:8080"
    environment:
      - VITE_VUE_APP_HOSTNAME=http://server:3000
      - VITE_NODE_ENV=production
      - VITE_BASE_URL=/
      - PORT=8080

  server:
    image: rssmonster/server:latest
    container_name: rssmonster-server
    restart: unless-stopped
    depends_on:
      - mysql
    ports:
      - "${SERVER_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_USERNAME=${DB_USERNAME:-rssmonster}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_DATABASE=${DB_DATABASE:-rssmonster}
      - DB_HOSTNAME=mysql

  mysql:
    image: mysql:5.7
    container_name: rssmonster-mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      - MYSQL_RANDOM_ROOT_PASSWORD=yes
      - MYSQL_DATABASE=${DB_DATABASE:-rssmonster}
      - MYSQL_USER=${DB_USERNAME:-rssmonster}
      - MYSQL_PASSWORD=${DB_PASSWORD:-password}
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:

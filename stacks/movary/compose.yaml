services:
  app:
    image: leepeuker/movary:latest
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:8080"
    environment:
      TMDB_API_KEY: ${TMDB_API_KEY:-your_tmdb_api_key_here}
      TMDB_ENABLE_IMAGE_CACHING: ${TMDB_ENABLE_IMAGE_CACHING:-0}
    volumes:
      - movary_data:/app/storage

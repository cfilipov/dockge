services:
  code-server:
    image: codercom/code-server:latest
    container_name: code-server
    ports:
      - "8080:8080"
    volumes:
      - config:/home/coder/.config
      - data:/home/coder/.local
      - workspace:/home/coder/project
    environment:
      - DOCKER_USER=${USER:-coder}
    restart: unless-stopped

volumes:
  config:
  data:
  workspace:

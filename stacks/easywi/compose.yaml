services:
  easywi:
    image: php:8.1-apache
    container_name: easywi
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./web:/var/www/html
    environment:
      MYSQL_HOST: db
      MYSQL_USER: ${DB_USER:-easywi}
      MYSQL_PASSWORD: ${DB_PASSWORD:-easywi_pass}
      MYSQL_DATABASE: ${DB_NAME:-easywi}
      TZ: ${TZ:-UTC}
    depends_on:
      - db

  db:
    image: mariadb:10.11
    container_name: easywi-db
    restart: unless-stopped
    volumes:
      - ./mysql-data:/var/lib/mysql
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MARIADB_DATABASE: ${DB_NAME:-easywi}
      MARIADB_USER: ${DB_USER:-easywi}
      MARIADB_PASSWORD: ${DB_PASSWORD:-easywi_pass}

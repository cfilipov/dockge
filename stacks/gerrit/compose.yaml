services:
  gerrit:
    image: gerritcodereview/gerrit:${GERRIT_VERSION:-latest}
    container_name: gerrit
    restart: unless-stopped
    ports:
      - "${GERRIT_HTTP_PORT:-8080}:8080"
      - "${GERRIT_SSH_PORT:-29418}:29418"
    volumes:
      - gerrit-site:/var/gerrit/review_site
    environment:
      - CANONICAL_WEB_URL=http://localhost:${GERRIT_HTTP_PORT:-8080}/

volumes:
  gerrit-site:

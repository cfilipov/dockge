services:
  partdb:
    image: jbtronics/part-db1:latest
    container_name: partdb
    restart: unless-stopped
    depends_on:
      - database
    ports:
      - "8080:80"
    volumes:
      - ./uploads:/var/www/html/uploads
      - ./public_media:/var/www/html/public/media
      - ./db:/var/www/html/var/db
    environment:
      - DATABASE_URL=mysql://partdb:partdbpassword@database:3306/partdb
      - APP_ENV=docker
      - DEFAULT_LANG=en
      - DEFAULT_TIMEZONE=Europe/Berlin
      - BASE_CURRENCY=EUR
      - INSTANCE_NAME=Part-DB
      - ALLOW_ATTACHMENT_DOWNLOADS=0
      - USE_GRAVATAR=0

  database:
    image: mysql:8.0
    container_name: partdb-db
    restart: unless-stopped
    volumes:
      - ./mysql:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=partdb
      - MYSQL_USER=partdb
      - MYSQL_PASSWORD=partdbpassword

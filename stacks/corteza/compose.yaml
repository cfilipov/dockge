services:
  server:
    image: cortezaproject/corteza:${VERSION:-2024.9}
    restart: always
    env_file: [.env]
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "18080:80"

  db:
    image: percona:8.0
    command: --sort_buffer_size=512K
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME:-corteza}
      MYSQL_USER: ${DB_USER:-corteza}
      MYSQL_PASSWORD: ${DB_PASS:-corteza}
      MYSQL_RANDOM_ROOT_PASSWORD: random
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    volumes:
      - db-data:/var/lib/mysql

volumes:
  db-data:

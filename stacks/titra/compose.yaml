services:
  titra:
    image: kromit/titra:latest
    container_name: titra
    depends_on:
      - mongodb
    environment:
      - ROOT_URL=${ROOT_URL}
      - MONGO_URL=mongodb://mongodb/titra?directConnection=true
      - PORT=3000
    ports:
      - "${TITRA_PORT:-3000}:3000"
    restart: unless-stopped

  mongodb:
    image: mongo:7.0
    container_name: titra-db
    environment:
      - MONGO_DB=titra
    volumes:
      - titra_db:/data/db
    restart: unless-stopped

volumes:
  titra_db:

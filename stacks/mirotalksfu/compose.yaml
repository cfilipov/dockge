services:
  mirotalksfu:
    image: mirotalk/sfu:latest
    container_name: mirotalksfu
    hostname: mirotalksfu
    restart: unless-stopped
    ports:
      - "3010:3010/tcp"
      - "40000-40100:40000-40100/tcp"
      - "40000-40100:40000-40100/udp"
    volumes:
      - ./.env:/src/.env:ro
    environment:
      - SFU_LISTEN_IP=0.0.0.0
      - SFU_MIN_PORT=40000
      - SFU_MAX_PORT=40100

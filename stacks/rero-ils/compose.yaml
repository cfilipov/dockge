# RERO ILS - Integrated Library System (Invenio-based)
# Based on: https://github.com/rero/rero-ils/blob/staging/docker-services.yml
#           https://github.com/rero/rero-ils/blob/staging/docker-compose.full.yml
# Docker Hub: https://hub.docker.com/r/rero/rero-ils
#
# Web UI: http://localhost:5000
# API: http://localhost:5001
# RabbitMQ Management: http://localhost:15672 (guest/guest)
# Kibana: http://localhost:5601
# Flower (task monitor): http://localhost:5555

services:
  web-ui:
    image: rero/rero-ils:${RERO_ILS_TAG:-ils-dev}
    restart: unless-stopped
    command: uv run uwsgi /invenio/var/instance/uwsgi_ui.ini
    environment:
      - "INVENIO_ACCOUNTS_SESSION_REDIS_URL=redis://cache:6379/1"
      - "INVENIO_BROKER_URL=amqp://guest:guest@mq:5672/"
      - "INVENIO_CACHE_REDIS_URL=redis://cache:6379/0"
      - "INVENIO_CACHE_TYPE=redis"
      - "INVENIO_CELERY_BROKER_URL=amqp://guest:guest@mq:5672/"
      - "INVENIO_CELERY_RESULT_BACKEND=redis://cache:6379/2"
      - "INVENIO_SEARCH_ELASTIC_HOSTS=['es:9200']"
      - "INVENIO_SECRET_KEY=${INVENIO_SECRET_KEY:-CHANGE_ME}"
      - "INVENIO_SQLALCHEMY_DATABASE_URI=postgresql+psycopg2://rero-ils:rero-ils@db/rero-ils"
      - "INVENIO_WSGI_PROXIES=2"
      - "INVENIO_RATELIMIT_STORAGE_URI=redis://cache:6379/3"
    ports:
      - "5000:5000"
    volumes:
      - static_data:/invenio/var/instance/static
    depends_on:
      - cache
      - es
      - mq
      - db

  web-api:
    image: rero/rero-ils:${RERO_ILS_TAG:-ils-dev}
    restart: unless-stopped
    command: uv run uwsgi /invenio/var/instance/uwsgi_rest.ini
    environment:
      - "INVENIO_ACCOUNTS_SESSION_REDIS_URL=redis://cache:6379/1"
      - "INVENIO_BROKER_URL=amqp://guest:guest@mq:5672/"
      - "INVENIO_CACHE_REDIS_URL=redis://cache:6379/0"
      - "INVENIO_CACHE_TYPE=redis"
      - "INVENIO_CELERY_BROKER_URL=amqp://guest:guest@mq:5672/"
      - "INVENIO_CELERY_RESULT_BACKEND=redis://cache:6379/2"
      - "INVENIO_SEARCH_ELASTIC_HOSTS=['es:9200']"
      - "INVENIO_SECRET_KEY=${INVENIO_SECRET_KEY:-CHANGE_ME}"
      - "INVENIO_SQLALCHEMY_DATABASE_URI=postgresql+psycopg2://rero-ils:rero-ils@db/rero-ils"
      - "INVENIO_WSGI_PROXIES=2"
      - "INVENIO_RATELIMIT_STORAGE_URI=redis://cache:6379/3"
    ports:
      - "5001:5001"
    volumes:
      - static_data:/invenio/var/instance/static
    depends_on:
      - cache
      - es
      - mq
      - db

  worker:
    image: rero/rero-ils:${RERO_ILS_TAG:-ils-dev}
    restart: unless-stopped
    command: "uv run celery --app rero_ils.celery worker --loglevel=INFO"
    environment:
      - "INVENIO_ACCOUNTS_SESSION_REDIS_URL=redis://cache:6379/1"
      - "INVENIO_BROKER_URL=amqp://guest:guest@mq:5672/"
      - "INVENIO_CACHE_REDIS_URL=redis://cache:6379/0"
      - "INVENIO_CACHE_TYPE=redis"
      - "INVENIO_CELERY_BROKER_URL=amqp://guest:guest@mq:5672/"
      - "INVENIO_CELERY_RESULT_BACKEND=redis://cache:6379/2"
      - "INVENIO_SEARCH_ELASTIC_HOSTS=['es:9200']"
      - "INVENIO_SECRET_KEY=${INVENIO_SECRET_KEY:-CHANGE_ME}"
      - "INVENIO_SQLALCHEMY_DATABASE_URI=postgresql+psycopg2://rero-ils:rero-ils@db/rero-ils"
      - "INVENIO_RATELIMIT_STORAGE_URI=redis://cache:6379/3"
    depends_on:
      - cache
      - es
      - mq
      - db

  beat:
    image: rero/rero-ils:${RERO_ILS_TAG:-ils-dev}
    restart: unless-stopped
    command: "uv run celery --app rero_ils.celery beat -S rero_ils.schedulers.DatabaseScheduler --loglevel=INFO"
    environment:
      - "INVENIO_ACCOUNTS_SESSION_REDIS_URL=redis://cache:6379/1"
      - "INVENIO_BROKER_URL=amqp://guest:guest@mq:5672/"
      - "INVENIO_CACHE_REDIS_URL=redis://cache:6379/0"
      - "INVENIO_CACHE_TYPE=redis"
      - "INVENIO_CELERY_BROKER_URL=amqp://guest:guest@mq:5672/"
      - "INVENIO_CELERY_RESULT_BACKEND=redis://cache:6379/2"
      - "INVENIO_SEARCH_ELASTIC_HOSTS=['es:9200']"
      - "INVENIO_SECRET_KEY=${INVENIO_SECRET_KEY:-CHANGE_ME}"
      - "INVENIO_SQLALCHEMY_DATABASE_URI=postgresql+psycopg2://rero-ils:rero-ils@db/rero-ils"
      - "INVENIO_RATELIMIT_STORAGE_URI=redis://cache:6379/3"
    depends_on:
      - cache
      - es
      - mq
      - db

  cache:
    image: redis
    restart: unless-stopped
    read_only: true
    command: redis-server --save ""
    ports:
      - "6379:6379"

  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      - "POSTGRES_USER=rero-ils"
      - "POSTGRES_PASSWORD=rero-ils"
      - "POSTGRES_DB=rero-ils"
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  mq:
    image: rabbitmq:3-management
    restart: unless-stopped
    ports:
      - "15672:15672"
      - "5672:5672"

  es:
    image: docker.elastic.co/elasticsearch/elasticsearch-oss:7.10.2
    restart: unless-stopped
    environment:
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - "discovery.type=single-node"
      - "indices.query.bool.max_clause_count=3000"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    mem_limit: 1g
    volumes:
      - es-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
      - "9300:9300"

  kibana:
    image: docker.elastic.co/kibana/kibana-oss:7.10.2
    restart: unless-stopped
    environment:
      - "ELASTICSEARCH_URL=http://es:9200"
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "5601:5601"
    depends_on:
      - es

  flower:
    image: mher/flower
    restart: unless-stopped
    command: --broker=amqp://guest:guest@mq:5672/ --broker_api=http://guest:guest@mq:15672/api/
    ports:
      - "5555:5555"
    depends_on:
      - mq

volumes:
  static_data:
  db-data:
  es-data:

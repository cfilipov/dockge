services:
  database:
    image: mariadb:10.11
    container_name: pelican-db
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - ./mysql-data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-SuperSecretRootPass}
      MYSQL_PASSWORD: ${DB_PASSWORD:-PelicanDBPass}
      MYSQL_DATABASE: ${DB_NAME:-panel}
      MYSQL_USER: ${DB_USER:-pelican}

  cache:
    image: redis:alpine
    container_name: pelican-cache
    restart: always

  panel:
    image: ghcr.io/pelican-dev/panel:latest
    container_name: pelican-panel
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - pelican-data:/pelican-data
      - pelican-logs:/var/www/html/storage/logs
    environment:
      APP_URL: ${APP_URL:-http://localhost}
      APP_ENV: production
      APP_DEBUG: "false"
      LE_EMAIL: ${LE_EMAIL:-admin@example.com}
      XDG_DATA_HOME: /pelican-data
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: cache
      DB_CONNECTION: mariadb
      DB_HOST: database
      DB_PORT: "3306"
      DB_DATABASE: ${DB_NAME:-panel}
      DB_USERNAME: ${DB_USER:-pelican}
      DB_PASSWORD: ${DB_PASSWORD:-PelicanDBPass}
      MAIL_DRIVER: ${MAIL_DRIVER:-log}
    depends_on:
      - database
      - cache

volumes:
  pelican-data:
  pelican-logs:

networks:
  default:
    ipam:
      config:
        - subnet: 172.20.0.0/16

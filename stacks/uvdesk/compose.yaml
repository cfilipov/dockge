services:
  uvdesk:
    image: webkul/uvdesk:latest
    container_name: uvdesk
    ports:
      - "${UVDESK_PORT:-8080}:80"
    environment:
      - DATABASE_HOST=db
      - DATABASE_PORT=3306
      - DATABASE_NAME=${DB_NAME:-uvdesk}
      - DATABASE_USER=${DB_USER:-uvdesk}
      - DATABASE_PASSWORD=${DB_PASSWORD:-uvdesk_pass}
      - MAILER_URL=${MAILER_URL:-null://localhost}
    volumes:
      - uvdesk_data:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: uvdesk-db
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-rootpass}
      - MYSQL_DATABASE=${DB_NAME:-uvdesk}
      - MYSQL_USER=${DB_USER:-uvdesk}
      - MYSQL_PASSWORD=${DB_PASSWORD:-uvdesk_pass}
    volumes:
      - uvdesk_db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  uvdesk_data:
  uvdesk_db:

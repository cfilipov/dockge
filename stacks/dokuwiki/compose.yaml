services:
  dokuwiki:
    image: lscr.io/linuxserver/dokuwiki:latest
    container_name: dokuwiki
    restart: unless-stopped
    ports:
      - "${DOKUWIKI_PORT:-8080}:80"
      - "${DOKUWIKI_HTTPS_PORT:-8443}:443"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Etc/UTC}
    volumes:
      - dokuwiki_config:/config

volumes:
  dokuwiki_config:

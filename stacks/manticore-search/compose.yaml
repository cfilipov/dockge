services:
  manticore:
    image: manticoresearch/manticore:${MANTICORE_TAG}
    container_name: manticore
    ports:
      - "${MANTICORE_SQL_PORT}:9306"
      - "${MANTICORE_HTTP_PORT}:9308"
      - "${MANTICORE_BINARY_PORT}:9312"
    volumes:
      - manticore-data:/var/lib/manticore
    ulimits:
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535
      memlock:
        soft: -1
        hard: -1
    restart: unless-stopped

volumes:
  manticore-data:

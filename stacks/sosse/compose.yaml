services:
  sosse:
    image: biolds/sosse:${SOSSE_TAG}
    container_name: sosse_app
    depends_on:
      - postgres
    environment:
      - SOSSE_DB_NAME=${POSTGRES_DB}
      - SOSSE_DB_USER=${POSTGRES_USER}
      - SOSSE_DB_PASS=${POSTGRES_PASSWORD}
      - SOSSE_DB_HOST=postgres
    ports:
      - "${SOSSE_PORT}:80"
    volumes:
      - sosse-data:/var/lib/sosse
    restart: unless-stopped

  postgres:
    image: postgres:${POSTGRES_TAG}
    container_name: sosse_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  sosse-data:
  postgres-data:

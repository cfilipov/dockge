services:
  domoticz:
    image: domoticz/domoticz:${DOMOTICZ_VERSION:-stable}
    container_name: domoticz
    restart: unless-stopped
    ports:
      - "${DOMOTICZ_PORT:-8080}:8080"
      - "${DOMOTICZ_SSL_PORT:-443}:443"
    volumes:
      - domoticz-data:/opt/domoticz/userdata
    environment:
      - TZ=${TZ:-UTC}
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0

volumes:
  domoticz-data:

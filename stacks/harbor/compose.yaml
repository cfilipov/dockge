services:
  log:
    image: goharbor/harbor-log:v2.11.2
    container_name: harbor-log
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    volumes:
      - log:/var/log/docker/:z
      - type: bind
        source: ./common/config/log/logrotate.conf
        target: /etc/logrotate.d/logrotate.conf
      - type: bind
        source: ./common/config/log/rsyslog_docker.conf
        target: /etc/rsyslog.d/rsyslog_docker.conf
    ports:
      - "1514:10514"
    networks:
      - harbor

  registry:
    image: goharbor/registry-photon:v2.11.2
    container_name: registry
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    volumes:
      - registry_data:/storage:z
      - type: bind
        source: ./common/config/registry/
        target: /etc/registry/
      - type: bind
        source: ./common/config/shared/trust-certificates
        target: /harbor_cust_cert
    networks:
      - harbor
    depends_on:
      - log

  registryctl:
    image: goharbor/harbor-registryctl:v2.11.2
    container_name: registryctl
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    volumes:
      - registry_data:/storage:z
      - type: bind
        source: ./common/config/registry/
        target: /etc/registry/
      - type: bind
        source: ./common/config/registryctl/config.yml
        target: /etc/registryctl/config.yml
    networks:
      - harbor
    depends_on:
      - log

  postgresql:
    image: goharbor/harbor-db:v2.11.2
    container_name: harbor-db
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    volumes:
      - database:/var/lib/postgresql/data:z
    networks:
      - harbor
    depends_on:
      - log
    environment:
      POSTGRES_PASSWORD: ${HARBOR_DB_PASSWORD:-root123}

  core:
    image: goharbor/harbor-core:v2.11.2
    container_name: harbor-core
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
    volumes:
      - core_data:/data:z
      - type: bind
        source: ./common/config/core/app.conf
        target: /etc/core/app.conf
      - type: bind
        source: ./common/config/core/certificates/
        target: /etc/core/certificates/
      - type: bind
        source: ./common/config/shared/trust-certificates
        target: /harbor_cust_cert
    networks:
      - harbor
    depends_on:
      - log
      - registry
      - redis
      - postgresql
    environment:
      CORE_SECRET: ${HARBOR_CORE_SECRET:-change-me}
      JOBSERVICE_SECRET: ${HARBOR_JOBSERVICE_SECRET:-change-me}

  portal:
    image: goharbor/harbor-portal:v2.11.2
    container_name: harbor-portal
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    networks:
      - harbor
    depends_on:
      - log

  jobservice:
    image: goharbor/harbor-jobservice:v2.11.2
    container_name: harbor-jobservice
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    volumes:
      - jobservice_data:/var/log/jobs:z
      - type: bind
        source: ./common/config/jobservice/config.yml
        target: /etc/jobservice/config.yml
    networks:
      - harbor
    depends_on:
      - core
    environment:
      CORE_SECRET: ${HARBOR_CORE_SECRET:-change-me}
      JOBSERVICE_SECRET: ${HARBOR_JOBSERVICE_SECRET:-change-me}

  redis:
    image: goharbor/redis-photon:v2.11.2
    container_name: redis
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    volumes:
      - redis_data:/var/lib/redis
    networks:
      - harbor
    depends_on:
      - log

  proxy:
    image: goharbor/nginx-photon:v2.11.2
    container_name: nginx
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    volumes:
      - type: bind
        source: ./common/config/nginx
        target: /etc/nginx
    networks:
      - harbor
    ports:
      - "80:8080"
      - "443:8443"
    depends_on:
      - registry
      - core
      - portal
      - log

networks:
  harbor:

volumes:
  log:
  registry_data:
  database:
  core_data:
  jobservice_data:
  redis_data:

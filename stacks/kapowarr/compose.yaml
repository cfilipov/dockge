services:
  kapowarr:
    image: mrcas/kapowarr:latest
    container_name: kapowarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - kapowarr-db:/app/db
      - ./downloads:/app/temp_downloads
      - ./comics:/comics
    ports:
      - "5656:5656"
    restart: unless-stopped

volumes:
  kapowarr-db:

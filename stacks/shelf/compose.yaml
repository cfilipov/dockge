services:
  shelf:
    image: ghcr.io/shelf-nu/shelf.nu:latest
    container_name: shelf
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DIRECT_URL=${DIRECT_URL}
      - SUPABASE_ANON_PUBLIC=${SUPABASE_ANON_PUBLIC}
      - SUPABASE_SERVICE_ROLE=${SUPABASE_SERVICE_ROLE}
      - SUPABASE_URL=${SUPABASE_URL}
      - SESSION_SECRET=${SESSION_SECRET:-super-duper-s3cret}
      - SERVER_URL=${SERVER_URL:-http://localhost:3000}
      - MAPTILER_TOKEN=${MAPTILER_TOKEN}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_USER=${SMTP_USER}
      - SMTP_FROM=${SMTP_FROM}
      - SMTP_PWD=${SMTP_PWD}
      - INVITE_TOKEN_SECRET=${INVITE_TOKEN_SECRET:-another-super-duper-s3cret}

services:
  static-web-server:
    image: joseluisq/static-web-server:${SWS_VERSION:-2}
    container_name: static-web-server
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8787}:80"
    volumes:
      - ./public:/public:ro
    environment:
      - SERVER_PORT=80
      - SERVER_ROOT=/public
      - SERVER_LOG_LEVEL=${LOG_LEVEL:-info}

services:
  redis:
    image: redis:7.0.10
    container_name: canarytokens-redis
    restart: always
    volumes:
      - ./data:/data/
    command: redis-server --appendonly yes --protected-mode no --save 60 1

  frontend:
    image: thinkst/canarytokens
    container_name: canarytokens-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT}:8082"
    env_file:
      - frontend.env
    volumes:
      - ./frontend.env:/srv/frontend/frontend.env:ro
      - ./switchboard.env:/srv/switchboard/switchboard.env:ro
      - ./uploads:/uploads/
      - log-volume:/logs
    command: bash -c "cd frontend; poetry run python -m uvicorn app:app --host 0.0.0.0 --port 8082"

  switchboard:
    image: thinkst/canarytokens
    container_name: canarytokens-switchboard
    restart: always
    ports:
      - "25:2500"
      - "3306:3306"
      - "53:5354"
      - "53:5354/udp"
      - "6443:6443"
      - "${SWITCHBOARD_PORT}:8083"
      - "51820:51820/udp"
    env_file:
      - switchboard.env
    volumes:
      - ./frontend.env:/srv/frontend/frontend.env:ro
      - ./switchboard.env:/srv/switchboard/switchboard.env:ro
      - ./uploads:/uploads/
      - log-volume:/logs
    command: bash -c "cd switchboard; rm -f switchboard.pid; poetry run twistd -noy switchboard.tac --pidfile=switchboard.pid"

  nginx:
    image: thinkst/canarytokens_nginx
    container_name: canarytokens-nginx
    restart: always
    ports:
      - "${HTTP_PORT}:80"
    depends_on:
      - frontend
      - switchboard
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d/
    command: /usr/sbin/nginx -c /etc/nginx/nginx.conf -g "daemon off;"

volumes:
  log-volume:

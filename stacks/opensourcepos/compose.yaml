services:
  ospos:
    image: jekkos/opensourcepos:master
    restart: always
    depends_on:
      - mysql
    ports:
      - "80:80"
    networks:
      - app_net
    volumes:
      - uploads:/app/public/uploads
      - logs:/app/writable/logs
    environment:
      CI_ENVIRONMENT: production
      FORCE_HTTPS: "false"
      PHP_TIMEZONE: UTC
      MYSQL_USERNAME: admin
      MYSQL_PASSWORD: pointofsale
      MYSQL_DB_NAME: ospos
      MYSQL_HOST_NAME: mysql

  mysql:
    image: mariadb:10.5
    restart: always
    expose:
      - "3306"
    networks:
      - app_net
    volumes:
      - mysql:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: pointofsale
      MYSQL_DATABASE: ospos
      MYSQL_USER: admin
      MYSQL_PASSWORD: pointofsale

volumes:
  uploads:
  logs:
  mysql:

networks:
  app_net:

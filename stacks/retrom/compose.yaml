services:
  retrom-db:
    image: postgres:16-alpine
    container_name: retrom-db
    restart: always
    shm_size: 128mb
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    environment:
      TZ: ${TZ:-America/Los_Angeles}
      PGTZ: ${TZ:-America/Los_Angeles}
      POSTGRES_PASSWORD: ${DB_PASS:-password}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_DB: ${DB_NAME:-retrom}

  retrom:
    image: ghcr.io/jmberesford/retrom-service:latest
    container_name: retrom
    restart: unless-stopped
    ports:
      - "${PORT:-5101}:5101"
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ${LIBRARY_PATH:-./library}:/library
      - ./config:/config
    environment:
      RETROM_CONFIG: /config/config.json
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASS:-password}@retrom-db:5432/${DB_NAME:-retrom}
    depends_on:
      - retrom-db

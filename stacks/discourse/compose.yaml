services:
  postgresql:
    image: bitnami/postgresql:16
    restart: unless-stopped
    environment:
      POSTGRESQL_USERNAME: bn_discourse
      POSTGRESQL_PASSWORD: ${DB_PASSWORD}
      POSTGRESQL_DATABASE: bitnami_discourse
      POSTGRESQL_EXTRA_FLAGS: >-
        -c shared_preload_libraries=pg_trgm
    volumes:
      - postgresql-data:/bitnami/postgresql

  redis:
    image: bitnami/redis:7.4
    restart: unless-stopped
    environment:
      ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - redis-data:/bitnami/redis

  discourse:
    image: bitnami/discourse:3
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - postgresql
      - redis
    environment:
      DISCOURSE_HOST: ${DISCOURSE_HOST}
      DISCOURSE_DATABASE_HOST: postgresql
      DISCOURSE_DATABASE_PORT_NUMBER: 5432
      DISCOURSE_DATABASE_USER: bn_discourse
      DISCOURSE_DATABASE_PASSWORD: ${DB_PASSWORD}
      DISCOURSE_DATABASE_NAME: bitnami_discourse
      DISCOURSE_REDIS_HOST: redis
      DISCOURSE_REDIS_PORT_NUMBER: 6379
      DISCOURSE_USERNAME: ${DISCOURSE_USERNAME}
      DISCOURSE_PASSWORD: ${DISCOURSE_PASSWORD}
      DISCOURSE_EMAIL: ${DISCOURSE_EMAIL}
    volumes:
      - discourse-data:/bitnami/discourse

  sidekiq:
    image: bitnami/discourse:3
    restart: unless-stopped
    depends_on:
      - discourse
    command: /opt/bitnami/scripts/discourse-sidekiq/run.sh
    environment:
      DISCOURSE_HOST: ${DISCOURSE_HOST}
      DISCOURSE_DATABASE_HOST: postgresql
      DISCOURSE_DATABASE_PORT_NUMBER: 5432
      DISCOURSE_DATABASE_USER: bn_discourse
      DISCOURSE_DATABASE_PASSWORD: ${DB_PASSWORD}
      DISCOURSE_DATABASE_NAME: bitnami_discourse
      DISCOURSE_REDIS_HOST: redis
      DISCOURSE_REDIS_PORT_NUMBER: 6379
    volumes:
      - discourse-data:/bitnami/discourse

volumes:
  postgresql-data:
  redis-data:
  discourse-data:

services:
  dns-server:
    container_name: dns-server
    hostname: dns-server
    image: technitium/dns-server:latest
    ports:
      - "${DNS_WEB_PORT:-5380}:5380/tcp"
      - "${DNS_PORT:-53}:53/udp"
      - "${DNS_PORT:-53}:53/tcp"
    environment:
      - DNS_SERVER_DOMAIN=${DNS_SERVER_DOMAIN:-dns-server}
      - DNS_SERVER_ADMIN_PASSWORD=${DNS_SERVER_ADMIN_PASSWORD:-admin}
      - DNS_SERVER_LOG_USING_LOCAL_TIME=true
    volumes:
      - config:/etc/dns
    restart: unless-stopped
    sysctls:
      - net.ipv4.ip_local_port_range=1024 65535

volumes:
  config:

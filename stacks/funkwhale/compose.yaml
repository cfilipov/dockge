services:
  postgres:
    image: postgres:${POSTGRES_VERSION:-15-alpine}
    container_name: funkwhale-db
    restart: unless-stopped
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_DB: ${FUNKWHALE_DATABASE_URL_DB:-funkwhale}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:${REDIS_VERSION:-7-alpine}
    container_name: funkwhale-redis
    restart: unless-stopped
    volumes:
      - ./data/redis:/data

  celeryworker:
    image: funkwhale/api:${FUNKWHALE_VERSION:-latest}
    container_name: funkwhale-worker
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    env_file: .env
    command:
      - celery
      - --app=funkwhale_api.taskapp
      - worker
      - --loglevel=INFO
      - --concurrency=${CELERYD_CONCURRENCY:-0}
    environment:
      C_FORCE_ROOT: "true"
    volumes:
      - "${MUSIC_DIRECTORY_SERVE_PATH:-./music}:${MUSIC_DIRECTORY_PATH:-/music}:ro"
      - ./data/media:/srv/funkwhale/data/media

  celerybeat:
    image: funkwhale/api:${FUNKWHALE_VERSION:-latest}
    container_name: funkwhale-beat
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    env_file: .env
    command:
      - celery
      - --app=funkwhale_api.taskapp
      - beat
      - --loglevel=INFO

  api:
    image: funkwhale/api:${FUNKWHALE_VERSION:-latest}
    container_name: funkwhale-api
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    env_file: .env
    volumes:
      - "${MUSIC_DIRECTORY_SERVE_PATH:-./music}:${MUSIC_DIRECTORY_PATH:-/music}:ro"
      - ./data/media:/srv/funkwhale/data/media
      - ./data/static:/srv/funkwhale/data/static

  front:
    image: funkwhale/front:${FUNKWHALE_VERSION:-latest}
    container_name: funkwhale-front
    restart: unless-stopped
    depends_on:
      - api
    env_file: .env
    environment:
      NGINX_MAX_BODY_SIZE: ${NGINX_MAX_BODY_SIZE:-100M}
    ports:
      - "${FUNKWHALE_API_PORT:-5000}:80"
    volumes:
      - "${MUSIC_DIRECTORY_SERVE_PATH:-./music}:${MUSIC_DIRECTORY_PATH:-/music}:ro"
      - ./data/media:/srv/funkwhale/data/media:ro
      - ./data/static:/usr/share/nginx/html/staticfiles:ro

services:
  redaxo:
    image: friendsofredaxo/redaxo:5
    ports:
      - "${REDAXO_PORT:-80}:80"
    volumes:
      - redaxo_data:/var/www/html
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mysql:8
    environment:
      MYSQL_DATABASE: redaxo
      MYSQL_USER: redaxo
      MYSQL_PASSWORD: redaxo
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  redaxo_data:
  db_data:

services:
  swetrix:
    image: swetrix/swetrix-fe:v5.0.3
    container_name: swetrix-fe
    restart: always
    depends_on:
      - swetrix-api
    environment:
      - BASE_URL=${BASE_URL:-http://localhost}
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/ping || exit 1"]
      interval: 30s
      start_period: 15s

  swetrix-api:
    image: swetrix/swetrix-api:v5.0.3
    container_name: swetrix-api
    restart: always
    environment:
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
      - DISABLE_REGISTRATION=${DISABLE_REGISTRATION:-true}
      - DEBUG_MODE=${DEBUG_MODE:-false}
      - SMTP_MOCK=${SMTP_MOCK:-true}
      - REDIS_HOST=redis
      - CLICKHOUSE_HOST=http://clickhouse
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:5005/ping || exit 1"]
      interval: 30s
      start_period: 15s

  redis:
    image: redis:8.2-alpine
    container_name: swetrix-redis
    restart: always
    environment:
      - REDIS_PORT=6379
      - REDIS_USER=default
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 30s
      start_period: 1m

  clickhouse:
    image: clickhouse/clickhouse-server:24.10-alpine
    container_name: swetrix-clickhouse
    restart: always
    environment:
      - CLICKHOUSE_DATABASE=analytics
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 -O - http://127.0.0.1:8123/ping || exit 1"]
      interval: 30s
      start_period: 1m
    cap_add:
      - SYS_NICE
    volumes:
      - swetrix-events-data:/var/lib/clickhouse
      - ./clickhouse/reduce-logs.xml:/etc/clickhouse-server/config.d/reduce-logs.xml:ro
      - ./clickhouse/disable-user-logging.xml:/etc/clickhouse-server/users.d/disable-user-logging.xml:ro
      - ./clickhouse/preserve-ram-config.xml:/etc/clickhouse-server/config.d/preserve-ram-config.xml:ro
      - ./clickhouse/preserve-ram-user.xml:/etc/clickhouse-server/users.d/preserve-ram-user.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  nginx-proxy:
    image: nginx:1.29.4-alpine
    container_name: swetrix-nginx
    restart: always
    depends_on:
      swetrix:
        condition: service_healthy
      swetrix-api:
        condition: service_healthy
    ports:
      - "${SWETRIX_PORT:-80}:80"
    volumes:
      - ./nginx/config:/etc/nginx/conf.d/default.conf

volumes:
  swetrix-events-data:

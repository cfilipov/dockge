services:
  grist:
    image: gristlabs/grist:latest
    container_name: grist
    restart: unless-stopped
    ports:
      - "8484:8484"
    environment:
      - PORT=8484
      - GRIST_DEFAULT_EMAIL=${GRIST_DEFAULT_EMAIL:-you@example.com}
      - GRIST_DATA_DIR=/persist/docs
    volumes:
      - grist-data:/persist

volumes:
  grist-data:

services:
  peertube:
    image: chocobozzz/peertube:production
    container_name: peertube
    restart: always
    ports:
      - "${PEERTUBE_WEB_PORT:-9000}:9000"
      - "${PEERTUBE_RTMP_PORT:-1935}:1935"
    volumes:
      - peertube-data:/data
      - peertube-config:/config
    environment:
      - PEERTUBE_WEBSERVER_HOSTNAME=${PEERTUBE_WEBSERVER_HOSTNAME}
      - PEERTUBE_WEBSERVER_PORT=${PEERTUBE_WEBSERVER_PORT}
      - PEERTUBE_WEBSERVER_HTTPS=false
      - PEERTUBE_DB_HOSTNAME=peertube-db
      - PEERTUBE_DB_USERNAME=${POSTGRES_USER}
      - PEERTUBE_DB_PASSWORD=${POSTGRES_PASSWORD}
      - PEERTUBE_DB_SSL=false
      - PEERTUBE_REDIS_HOSTNAME=peertube-redis
      - PEERTUBE_SECRET=${PEERTUBE_SECRET}
      - PEERTUBE_ADMIN_EMAIL=${PEERTUBE_ADMIN_EMAIL}
    depends_on:
      - peertube-db
      - peertube-redis

  peertube-db:
    image: postgres:17-alpine
    container_name: peertube-db
    restart: always
    volumes:
      - peertube-db:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=peertube

  peertube-redis:
    image: redis:8-alpine
    container_name: peertube-redis
    restart: always
    volumes:
      - peertube-redis:/data

volumes:
  peertube-data:
  peertube-config:
  peertube-db:
  peertube-redis:

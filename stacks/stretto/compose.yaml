services:
  stretto:
    image: benkaiser/stretto:latest
    container_name: stretto
    environment:
      PORT: "3000"
      ENV: production
      APP_URL: ${APP_URL:-http://localhost:3000}
      MONGO_URL: mongodb://mongo:27017/${MONGO_DB:-stretto}
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: stretto-mongo
    volumes:
      - ${MONGO_DATA:-./mongo-data}:/data/db
    restart: unless-stopped

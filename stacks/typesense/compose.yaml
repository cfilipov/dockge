services:
  typesense:
    image: typesense/typesense:${TYPESENSE_TAG}
    container_name: typesense
    ports:
      - "${TYPESENSE_PORT}:8108"
    volumes:
      - typesense-data:/data
    command: --data-dir /data --api-key=${TYPESENSE_API_KEY} --listen-port 8108
    restart: unless-stopped

volumes:
  typesense-data:

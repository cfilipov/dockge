services:
  fcrepo:
    image: fcrepo/fcrepo:6.5.1-tomcat9
    container_name: fcrepo
    ports:
      - "${FCREPO_PORT:-8080}:8080"
    environment:
      - CATALINA_OPTS=-Djava.awt.headless=true -Dfcrepo.home=/fcrepo-home -XX:+UseG1GC -XX:MaxGCPauseMillis=200
    volumes:
      - fcrepo_data:/fcrepo-home
    restart: unless-stopped

volumes:
  fcrepo_data:

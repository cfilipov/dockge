services:
  server:
    image: ghcr.io/arthi-chaud/meelo-server:latest
    container_name: meelo-server
    restart: on-failure
    expose:
      - "4000"
    depends_on:
      db:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    environment:
      - MEILI_HOST=http://meilisearch:7700
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
    volumes:
      - ${DATA_DIR}:/data
      - ${CONFIG_DIR}:/config
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- localhost:4000"]
      interval: 5s
      timeout: 5s
      retries: 20

  front:
    image: ghcr.io/arthi-chaud/meelo-front:latest
    container_name: meelo-front
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:3000"
    depends_on:
      server:
        condition: service_healthy
    environment:
      - PUBLIC_SERVER_URL=${PUBLIC_URL}/api
      - SSR_SERVER_URL=http://server:4000

  scanner:
    image: ghcr.io/arthi-chaud/meelo-scanner:latest
    container_name: meelo-scanner
    restart: unless-stopped
    expose:
      - "8133"
    depends_on:
      server:
        condition: service_healthy
    environment:
      - API_URL=http://server:4000
      - API_KEYS=${API_KEYS}
    volumes:
      - ${DATA_DIR}:/data:ro
      - ${CONFIG_DIR}:/config:ro

  db:
    image: postgres:16-alpine
    container_name: meelo-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: meelo-meilisearch
    restart: unless-stopped
    environment:
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
      - MEILI_NO_ANALYTICS=true
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
  meili_data:

services:
  drawio:
    image: jgraph/drawio:latest
    container_name: drawio
    restart: unless-stopped
    ports:
      - "${DRAWIO_PORT:-8080}:8080"
    environment:
      - DRAWIO_SELF_CONTAINED=1
      - DRAWIO_BASE_URL=${DRAWIO_BASE_URL}
    volumes:
      - drawio_data:/var/lib/drawio

volumes:
  drawio_data:

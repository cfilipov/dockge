services:
  bookstack:
    image: lscr.io/linuxserver/bookstack:latest
    container_name: bookstack
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "${BOOKSTACK_PORT:-6875}:80"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Etc/UTC}
      - APP_URL=${APP_URL:-http://localhost:6875}
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-bookstackapp}
      - DB_USERNAME=${DB_USERNAME:-bookstack}
      - DB_PASSWORD=${DB_PASSWORD:-bookstack_secret}
    volumes:
      - bookstack_data:/config

  db:
    image: mariadb:11
    container_name: bookstack-db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-root_secret}
      - MYSQL_DATABASE=${DB_DATABASE:-bookstackapp}
      - MYSQL_USER=${DB_USERNAME:-bookstack}
      - MYSQL_PASSWORD=${DB_PASSWORD:-bookstack_secret}
    volumes:
      - db_data:/var/lib/mysql

volumes:
  bookstack_data:
  db_data:

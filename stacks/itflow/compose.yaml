services:
  itflow:
    image: itfloworg/itflow:latest
    restart: unless-stopped
    depends_on:
      - itflow-db
    ports:
      - "8080:8080"
    environment:
      - TZ=UTC
      - ITFLOW_NAME=ITFlow
      - ITFLOW_URL=localhost
      - ITFLOW_PORT=8080
      - ITFLOW_REPO=github.com/itflow-org/itflow
      - ITFLOW_REPO_BRANCH=master
      - ITFLOW_LOG_LEVEL=info
      - ITFLOW_DB_HOST=itflow-db
      - ITFLOW_DB_PASS=${ITFLOW_DB_PASS:-changeme}
    volumes:
      - itflow-data:/var/www/localhost/htdocs

  itflow-db:
    image: mariadb:10.11.6
    restart: unless-stopped
    environment:
      - MARIADB_RANDOM_ROOT_PASSWORD=true
      - MARIADB_DATABASE=itflow
      - MARIADB_USER=itflow
      - MARIADB_PASSWORD=${ITFLOW_DB_PASS:-changeme}
    volumes:
      - itflow-db:/var/lib/mysql

volumes:
  itflow-data:
  itflow-db:

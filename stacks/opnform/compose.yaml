services:
  api:
    image: jhumanj/opnform-api:latest
    volumes:
      - opnform_storage:/usr/share/nginx/html/storage:rw
    environment:
      APP_ENV: production
      DB_HOST: db
      REDIS_HOST: redis
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_CONNECTION: pgsql
      PHP_MEMORY_LIMIT: 1G
      PHP_MAX_EXECUTION_TIME: "600"
      PHP_UPLOAD_MAX_FILESIZE: 64M
      PHP_POST_MAX_SIZE: 64M
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  api-worker:
    image: jhumanj/opnform-api:latest
    command: ["php", "artisan", "queue:work"]
    volumes:
      - opnform_storage:/usr/share/nginx/html/storage:rw
    environment:
      APP_ENV: production
      DB_HOST: db
      REDIS_HOST: redis
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_CONNECTION: pgsql
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  ui:
    image: jhumanj/opnform-client:latest
    environment:
      NUXT_PUBLIC_APP_URL: ${APP_URL:-http://localhost}
      NUXT_PUBLIC_API_BASE: ${API_BASE:-/api}
    depends_on:
      - api
    restart: unless-stopped

  redis:
    image: redis:7
    volumes:
      - opnform_redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 30s
      timeout: 5s
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 30s
      timeout: 5s
    volumes:
      - opnform_db:/var/lib/postgresql/data
    restart: unless-stopped

  ingress:
    image: nginx:1.27
    volumes:
      - ./nginx.conf:/etc/nginx/templates/default.conf.template:ro
    ports:
      - "${OPNFORM_PORT:-80}:80"
    environment:
      NGINX_MAX_BODY_SIZE: 64m
    depends_on:
      - api
      - ui
    restart: unless-stopped

volumes:
  opnform_db:
  opnform_storage:
  opnform_redis:

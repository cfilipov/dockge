services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${CB_DB_NAME:-chartbrew}
      MYSQL_USER: ${CB_DB_USERNAME:-chartbrew}
      MYSQL_PASSWORD: ${CB_DB_PASSWORD:-changeme}
      MYSQL_RANDOM_ROOT_PASSWORD: "true"
      MYSQL_DEFAULT_AUTH: caching_sha2_password
    volumes:
      - chartbrew-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${CB_REDIS_PASSWORD:-changeme}
    ports:
      - "6379:6379"

  chartbrew:
    image: chartbrew/chartbrew:latest
    restart: unless-stopped
    ports:
      - "4018:4018"
      - "4019:4019"
    environment:
      CB_DB_HOST: db
      CB_DB_PORT: "3306"
      CB_DB_NAME: ${CB_DB_NAME:-chartbrew}
      CB_DB_USERNAME: ${CB_DB_USERNAME:-chartbrew}
      CB_DB_PASSWORD: ${CB_DB_PASSWORD:-changeme}
      CB_REDIS_HOST: redis
      CB_REDIS_PASSWORD: ${CB_REDIS_PASSWORD:-changeme}
      CB_SECRET: ${CB_SECRET:-changethissecret}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  chartbrew-db:

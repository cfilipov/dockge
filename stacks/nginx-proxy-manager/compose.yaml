services:
  npm:
    image: jc21/nginx-proxy-manager:${NPM_VERSION:-latest}
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${ADMIN_PORT:-81}:81"
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    environment:
      - TZ=${TZ:-Etc/UTC}
      - DB_SQLITE_FILE=/data/database.sqlite

volumes:
  npm_data:
  npm_letsencrypt:

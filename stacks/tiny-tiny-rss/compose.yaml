services:
  db:
    image: postgres:15-alpine
    container_name: ttrss-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${TTRSS_DB_USER:-ttrss}
      - POSTGRES_PASSWORD=${TTRSS_DB_PASS:-ttrss}
      - POSTGRES_DB=${TTRSS_DB_NAME:-ttrss}
    volumes:
      - db-data:/var/lib/postgresql/data

  app:
    image: cthulhoo/ttrss-fpm-pgsql-static:latest
    container_name: ttrss-app
    restart: unless-stopped
    depends_on:
      - db
    environment:
      - TTRSS_DB_TYPE=pgsql
      - TTRSS_DB_HOST=db
      - TTRSS_DB_NAME=${TTRSS_DB_NAME:-ttrss}
      - TTRSS_DB_USER=${TTRSS_DB_USER:-ttrss}
      - TTRSS_DB_PASS=${TTRSS_DB_PASS:-ttrss}
      - TTRSS_DB_PORT=5432
      - TTRSS_SELF_URL_PATH=${TTRSS_SELF_URL:-http://localhost:8280/tt-rss}
    volumes:
      - app-data:/var/www/html/tt-rss

  updater:
    image: cthulhoo/ttrss-fpm-pgsql-static:latest
    container_name: ttrss-updater
    restart: unless-stopped
    depends_on:
      - app
    environment:
      - TTRSS_DB_TYPE=pgsql
      - TTRSS_DB_HOST=db
      - TTRSS_DB_NAME=${TTRSS_DB_NAME:-ttrss}
      - TTRSS_DB_USER=${TTRSS_DB_USER:-ttrss}
      - TTRSS_DB_PASS=${TTRSS_DB_PASS:-ttrss}
      - TTRSS_DB_PORT=5432
      - TTRSS_SELF_URL_PATH=${TTRSS_SELF_URL:-http://localhost:8280/tt-rss}
    volumes:
      - app-data:/var/www/html/tt-rss
    command: /opt/tt-rss/updater.sh

  web:
    image: cthulhoo/ttrss-web-nginx:latest
    container_name: ttrss-web
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${TTRSS_HTTP_PORT:-8280}:80"
    volumes:
      - app-data:/var/www/html/tt-rss:ro

volumes:
  db-data:
  app-data:

services:
  restserver:
    image: ghcr.io/docspell/restserver:latest
    container_name: docspell-restserver
    restart: unless-stopped
    ports:
      - "7880:7880"
    depends_on:
      - db
      - solr
    environment:
      TZ: "Europe/Berlin"
      DOCSPELL_SERVER_INTERNAL__URL: "http://docspell-restserver:7880"
      DOCSPELL_SERVER_ADMIN__ENDPOINT_SECRET: "${ADMIN_SECRET}"
      DOCSPELL_SERVER_AUTH_SERVER__SECRET: "${AUTH_SECRET}"
      DOCSPELL_SERVER_BACKEND_JDBC_PASSWORD: "${DB_PASS}"
      DOCSPELL_SERVER_BACKEND_JDBC_URL: "jdbc:postgresql://db:5432/${DB_NAME}"
      DOCSPELL_SERVER_BACKEND_JDBC_USER: "${DB_USER}"
      DOCSPELL_SERVER_BIND_ADDRESS: "0.0.0.0"
      DOCSPELL_SERVER_FULL__TEXT__SEARCH_ENABLED: "true"
      DOCSPELL_SERVER_FULL__TEXT__SEARCH_SOLR_URL: "http://solr:8983/solr/docspell"
      DOCSPELL_SERVER_INTEGRATION__ENDPOINT_ENABLED: "true"
      DOCSPELL_SERVER_INTEGRATION__ENDPOINT_HTTP__HEADER_ENABLED: "true"
      DOCSPELL_SERVER_INTEGRATION__ENDPOINT_HTTP__HEADER_HEADER__VALUE: "${INTEGRATION_SECRET}"
      DOCSPELL_SERVER_BACKEND_SIGNUP_MODE: "open"
      DOCSPELL_SERVER_BACKEND_ADDONS_ENABLED: "false"

  joex:
    image: ghcr.io/docspell/joex:latest
    container_name: docspell-joex
    restart: unless-stopped
    depends_on:
      - db
      - solr
    environment:
      TZ: "Europe/Berlin"
      DOCSPELL_JOEX_APP__ID: "joex1"
      DOCSPELL_JOEX_PERIODIC__SCHEDULER_NAME: "joex1"
      DOCSPELL_JOEX_SCHEDULER_NAME: "joex1"
      DOCSPELL_JOEX_BASE__URL: "http://docspell-joex:7878"
      DOCSPELL_JOEX_BIND_ADDRESS: "0.0.0.0"
      DOCSPELL_JOEX_FULL__TEXT__SEARCH_ENABLED: "true"
      DOCSPELL_JOEX_FULL__TEXT__SEARCH_SOLR_URL: "http://solr:8983/solr/docspell"
      DOCSPELL_JOEX_JDBC_PASSWORD: "${DB_PASS}"
      DOCSPELL_JOEX_JDBC_URL: "jdbc:postgresql://db:5432/${DB_NAME}"
      DOCSPELL_JOEX_JDBC_USER: "${DB_USER}"
      DOCSPELL_JOEX_CONVERT_HTML__CONVERTER: "weasyprint"
    ports:
      - "7878:7878"

  consumedir:
    image: docspell/dsc:latest
    container_name: docspell-consumedir
    command:
      - dsc
      - "-d"
      - "http://docspell-restserver:7880"
      - "watch"
      - "--delete"
      - "-ir"
      - "--not-matches"
      - "**/.*"
      - "--header"
      - "Docspell-Integration:${INTEGRATION_SECRET}"
      - "/opt/docs"
    restart: unless-stopped
    volumes:
      - ./docs:/opt/docs

  db:
    image: postgres:16
    container_name: docspell-db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: "${DB_USER}"
      POSTGRES_PASSWORD: "${DB_PASS}"
      POSTGRES_DB: "${DB_NAME}"

  solr:
    image: solr:9
    container_name: docspell-solr
    restart: unless-stopped
    volumes:
      - solr_data:/var/solr
    command:
      - bash
      - -c
      - "precreate-core docspell; exec solr -f -Dsolr.modules=analysis-extras"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8983/solr/docspell/admin/ping"]
      interval: 1m
      timeout: 10s
      retries: 2
      start_period: 30s

volumes:
  postgres_data:
  solr_data:

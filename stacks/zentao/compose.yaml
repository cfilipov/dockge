services:
  zentao:
    image: easysoft/zentao:latest
    container_name: zentao
    ports:
      - "${ZENTAO_PORT:-8080}:80"
    environment:
      - MYSQL_HOST=db
      - MYSQL_PORT=3306
      - MYSQL_DB=${DB_NAME:-zentao}
      - MYSQL_USER=${DB_USER:-zentao}
      - MYSQL_PASSWORD=${DB_PASSWORD:-zentao_pass}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-rootpass}
      - IS_CONTAINER=true
    volumes:
      - zentao_data:/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: zentao-db
    command: --default-authentication-plugin=mysql_native_password
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-rootpass}
      - MYSQL_DATABASE=${DB_NAME:-zentao}
      - MYSQL_USER=${DB_USER:-zentao}
      - MYSQL_PASSWORD=${DB_PASSWORD:-zentao_pass}
    volumes:
      - zentao_db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  zentao_data:
  zentao_db:

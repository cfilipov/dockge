services:
  cmsms:
    image: php:8.1-apache
    container_name: cmsms
    ports:
      - "8080:80"
    depends_on:
      - mysql
    volumes:
      - cmsms_data:/var/www/html
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: cmsms-mysql
    environment:
      MYSQL_DATABASE: cmsms
      MYSQL_USER: cmsms
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  cmsms_data:
  mysql_data:

services:
  shopware:
    image: shyim/shopware:latest
    ports:
      - "${SHOPWARE_PORT:-8080}:80"
    restart: unless-stopped
    depends_on:
      - db
      - cache
    environment:
      DATABASE_URL: mysql://${DB_USER:-shopware}:${DB_PASSWORD:-shopware}@db:3306/${DB_NAME:-shopware}
      APP_URL: ${APP_URL:-http://localhost:8080}
      APP_SECRET: ${APP_SECRET:-changeme}
      SHOPWARE_ES_ENABLED: "0"
    volumes:
      - shopware_data:/var/www/html

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-shopware}
      MYSQL_USER: ${DB_USER:-shopware}
      MYSQL_PASSWORD: ${DB_PASSWORD:-shopware}
    volumes:
      - db_data:/var/lib/mysql

  cache:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - cache_data:/data

volumes:
  shopware_data:
  db_data:
  cache_data:

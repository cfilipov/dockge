services:
  not-thre:
    image: ghcr.io/not-thre/not-thre:latest
    container_name: not-thre
    restart: unless-stopped
    ports:
      - "${NOTTHRE_PORT:-8080}:8080"
    environment:
      - SECRET_KEY=${SECRET_KEY:-changeme-secret-key}
      - BASE_URL=${BASE_URL:-http://localhost:8080}
    volumes:
      - not-thre-data:/data

volumes:
  not-thre-data:

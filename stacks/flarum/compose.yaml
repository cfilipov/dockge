services:
  flarum:
    image: crazymax/flarum:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      TZ: America/New_York
      PUID: "1000"
      PGID: "1000"
      FLARUM_BASE_URL: ${FLARUM_BASE_URL}
      FLARUM_FORUM_TITLE: ${FLARUM_FORUM_TITLE}
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: flarum
      DB_USER: flarum
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - flarum-data:/data

  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: flarum
      MYSQL_USER: flarum
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql

volumes:
  flarum-data:
  db-data:

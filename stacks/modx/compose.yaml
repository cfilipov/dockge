services:
  modx:
    image: php:8.1-apache
    container_name: modx
    ports:
      - "8080:80"
    depends_on:
      - mysql
    volumes:
      - modx_data:/var/www/html
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: modx-mysql
    environment:
      MYSQL_DATABASE: modx
      MYSQL_USER: modx
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  modx_data:
  mysql_data:

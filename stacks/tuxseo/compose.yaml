services:
  db:
    image: rasulkireev/custom-postgres:17
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tuxseo}"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-tuxseo}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-tuxseo}
      - POSTGRES_DB=${POSTGRES_DB:-tuxseo}
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-tuxseo}
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    image: ghcr.io/rasulkireev/tuxseo:latest
    working_dir: /app
    ports:
      - "8000:80"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-tuxseo}:${POSTGRES_PASSWORD:-tuxseo}@db:5432/${POSTGRES_DB:-tuxseo}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-tuxseo}@redis:6379
    restart: unless-stopped

  workers:
    image: ghcr.io/rasulkireev/tuxseo-workers:latest
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-tuxseo}:${POSTGRES_PASSWORD:-tuxseo}@db:5432/${POSTGRES_DB:-tuxseo}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-tuxseo}@redis:6379
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

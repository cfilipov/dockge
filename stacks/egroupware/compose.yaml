services:
  egroupware:
    image: egroupware/egroupware:${EGROUPWARE_VERSION:-latest}
    container_name: egroupware
    restart: unless-stopped
    ports:
      - "${EGROUPWARE_HTTP_PORT:-8080}:80"
      - "${EGROUPWARE_HTTPS_PORT:-8443}:443"
    environment:
      EGW_DB_HOST: db
      EGW_DB_NAME: ${MYSQL_DATABASE}
      EGW_DB_USER: ${MYSQL_USER}
      EGW_DB_PASS: ${MYSQL_PASSWORD}
      EGW_ADMIN_USER: ${EGW_ADMIN_USER}
      EGW_ADMIN_PASSWD: ${EGW_ADMIN_PASSWD}
      EGW_DOMAIN: ${EGW_DOMAIN}
    volumes:
      - egroupware_data:/var/lib/egroupware
      - egroupware_files:/var/lib/egroupware/files
    depends_on:
      - db
    networks:
      - egroupware

  db:
    image: mariadb:${MARIADB_VERSION:-11}
    container_name: egroupware-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - egroupware

volumes:
  egroupware_data:
  egroupware_files:
  db_data:

networks:
  egroupware:
    driver: bridge

services:
  drop:
    image: ghcr.io/drop-oss/drop:latest
    container_name: drop
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./data:/data
      - ./library:/library
    environment:
      DATABASE_URL: postgres://${DB_USER:-drop}:${DB_PASSWORD:-droppass}@db:5432/${DB_NAME:-drop}
      LIBRARY_PATH: /library
      TZ: ${TZ:-UTC}
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: drop-db
    restart: unless-stopped
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USER:-drop}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-droppass}
      POSTGRES_DB: ${DB_NAME:-drop}

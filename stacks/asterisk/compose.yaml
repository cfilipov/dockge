services:
  asterisk:
    image: mlan/asterisk
    container_name: asterisk
    network_mode: bridge
    cap_add:
      - net_admin
      - net_raw
    ports:
      - "8080:80"
      - "5060:5060/udp"
      - "5060:5060"
      - "5061:5061"
      - "10000-10099:10000-10099/udp"
    environment:
      - SYSLOG_LEVEL=4
      - HOSTNAME=asterisk.local
      - WEBSMSD_PORT=80
    volumes:
      - asterisk-conf:/srv
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped

volumes:
  asterisk-conf:

services:
  xwiki:
    image: xwiki:${XWIKI_VERSION:-lts-postgres-tomcat}
    container_name: xwiki
    restart: unless-stopped
    ports:
      - "${XWIKI_PORT:-8080}:8080"
    volumes:
      - xwiki-data:/usr/local/xwiki
    environment:
      - DB_HOST=db
      - DB_USER=${POSTGRES_USER:-xwiki}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - DB_DATABASE=${POSTGRES_DB:-xwiki}
    depends_on:
      - db

  db:
    image: postgres:${POSTGRES_VERSION:-16-alpine}
    container_name: xwiki-db
    restart: unless-stopped
    volumes:
      - xwiki-db:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-xwiki}
      - POSTGRES_USER=${POSTGRES_USER:-xwiki}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=en_US.UTF-8 --lc-ctype=en_US.UTF-8

volumes:
  xwiki-data:
  xwiki-db:

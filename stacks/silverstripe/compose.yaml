services:
  silverstripe:
    image: brettt89/silverstripe-web:8.3-apache
    ports:
      - "8080:80"
    environment:
      SS_DATABASE_SERVER: db
      SS_DATABASE_NAME: silverstripe
      SS_DATABASE_USERNAME: silverstripe
      SS_DATABASE_PASSWORD: ${DB_PASSWORD}
      SS_DEFAULT_ADMIN_USERNAME: admin
      SS_DEFAULT_ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SS_ENVIRONMENT_TYPE: dev
    volumes:
      - app_data:/var/www/html
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: silverstripe
      MYSQL_USER: silverstripe
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  app_data:
  db_data:

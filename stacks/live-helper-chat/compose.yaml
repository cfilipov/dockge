services:
  web:
    image: nginx:alpine
    container_name: lhc-web
    ports:
      - "${LHC_PUBLIC_PORT}:80"
    depends_on:
      - php
    restart: unless-stopped

  php:
    image: livehelperchat/php-fpm:latest
    container_name: lhc-php
    environment:
      LHC_SECRET_HASH: ${LHC_SECRET_HASH}
      LHC_WEBHOOKS_ENABLED: ${LHC_WEBHOOKS_ENABLED}
    depends_on:
      - db
      - redis
    restart: unless-stopped

  db:
    image: mariadb:10
    container_name: lhc-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: lhc-redis
    restart: unless-stopped

  php-cronjob:
    image: livehelperchat/php-cronjob:latest
    container_name: lhc-cronjob
    depends_on:
      - db
      - redis
    restart: unless-stopped

  php-resque:
    image: livehelperchat/php-resque:latest
    container_name: lhc-resque
    environment:
      REDIS_BACKEND: "${REDIS_BACKEND}"
      REDIS_BACKEND_DB: "${REDIS_BACKEND_DB}"
    depends_on:
      - redis
    restart: unless-stopped

  nodejshelper:
    image: livehelperchat/nodejshelper:latest
    container_name: lhc-nodejs
    environment:
      LHC_NODE_JS_PORT: ${LHC_NODE_JS_PORT}
      LHC_NODE_JS_SECURE: ${LHC_NODE_JS_SECURE}
      REDIS_HOST: ${REDIS_HOST}
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  db_data:

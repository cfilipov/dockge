services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    shm_size: 256mb
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "mastodon"]
    environment:
      POSTGRES_DB: mastodon
      POSTGRES_USER: mastodon
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
    volumes:
      - redis-data:/data

  web:
    image: ghcr.io/mastodon/mastodon:v4.5
    restart: unless-stopped
    command: bundle exec puma -C config/puma.rb
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - db
      - redis
    env_file:
      - .env
    volumes:
      - mastodon-data:/opt/mastodon/public/system

  streaming:
    image: ghcr.io/mastodon/mastodon-streaming:v4.5
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    depends_on:
      - db
      - redis
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:4000/api/v1/streaming/health || exit 1"]

  sidekiq:
    image: ghcr.io/mastodon/mastodon:v4.5
    restart: unless-stopped
    command: bundle exec sidekiq
    depends_on:
      - db
      - redis
    env_file:
      - .env
    volumes:
      - mastodon-data:/opt/mastodon/public/system

volumes:
  postgres-data:
  redis-data:
  mastodon-data:

services:
  anycable-go:
    image: anycable/anycable-go:1.5
    container_name: anycable-go
    ports:
      - "8080:8080"
    environment:
      ANYCABLE_HOST: "0.0.0.0"
      ANYCABLE_PORT: "8080"
      ANYCABLE_REDIS_URL: "redis://redis:6379/0"
      ANYCABLE_RPC_HOST: "anycable-rpc:50051"
      ANYCABLE_DEBUG: "false"
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: anycable-redis
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:

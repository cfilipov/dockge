services:
  app:
    image: tolgee/tolgee:latest
    volumes:
      - tolgee_data:/data
    ports:
      - "8080:8080"
    environment:
      tolgee.postgres-autostart.enabled: "false"
      spring.datasource.url: jdbc:postgresql://db:5432/tolgee
      spring.datasource.username: tolgee
      spring.datasource.password: tolgee
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: tolgee
      POSTGRES_USER: tolgee
      POSTGRES_PASSWORD: tolgee
    volumes:
      - tolgee_postgres:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  tolgee_data:
  tolgee_postgres:

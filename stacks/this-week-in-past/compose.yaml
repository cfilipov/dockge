services:
  this-week-in-past:
    image: rouhim/this-week-in-past:latest
    container_name: this-week-in-past
    restart: unless-stopped
    ports:
      - "${TWIP_PORT:-8080}:8080"
    environment:
      SLIDESHOW_INTERVAL: ${SLIDESHOW_INTERVAL:-10}
      WEATHER_ENABLED: ${WEATHER_ENABLED:-false}
      OPEN_WEATHER_MAP_API_KEY: ${OPEN_WEATHER_MAP_API_KEY:-}
      BIGDATA_CLOUD_API_KEY: ${BIGDATA_CLOUD_API_KEY:-}
    volumes:
      - ${PHOTOS_DIR:-./photos}:/resources:ro

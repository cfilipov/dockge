services:
  web:
    image: eitchtee/wygiwyh:latest
    container_name: wygiwyh
    ports:
      - "${OUTBOUND_PORT:-9005}:${INTERNAL_PORT:-8000}"
    environment:
      - TZ=${TZ:-UTC}
      - DEBUG=${DEBUG:-false}
      - URL=${URL:-http://localhost}
      - HTTPS_ENABLED=${HTTPS_ENABLED:-false}
      - SECRET_KEY=${SECRET_KEY:-changeme-generate-a-safe-secret-key}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost 127.0.0.1 [::1]}
      - OUTBOUND_PORT=${OUTBOUND_PORT:-9005}
      - INTERNAL_PORT=${INTERNAL_PORT:-8000}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
      - SQL_DATABASE=${SQL_DATABASE:-wygiwyh}
      - SQL_USER=${SQL_USER:-wygiwyh}
      - SQL_PASSWORD=${SQL_PASSWORD:-changeme}
      - SQL_HOST=db
      - SQL_PORT=5432
      - WEB_CONCURRENCY=${WEB_CONCURRENCY:-4}
      - TASK_WORKERS=${TASK_WORKERS:-1}
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:15-bookworm
    container_name: wygiwyh-db
    restart: unless-stopped
    volumes:
      - ./postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=${SQL_USER:-wygiwyh}
      - POSTGRES_PASSWORD=${SQL_PASSWORD:-changeme}
      - POSTGRES_DB=${SQL_DATABASE:-wygiwyh}

services:
  mathesar:
    image: mathesar/mathesar-prod:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DJANGO_DATABASE_URL: postgresql://${POSTGRES_USER:-mathesar}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-mathesar}
      SECRET_KEY: ${SECRET_KEY:-changethissecretkey}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - mathesar-media:/home/mathesar/media
      - mathesar-static:/home/mathesar/static

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mathesar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-mathesar}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mathesar}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  mathesar-media:
  mathesar-static:

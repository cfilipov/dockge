services:
  spis:
    image: ghcr.io/gbbirkisson/spis:latest
    container_name: spis
    restart: unless-stopped
    ports:
      - "${SPIS_PORT:-8080}:8080"
    environment:
      SPIS_PROCESSING_SCHEDULE: ${SPIS_PROCESSING_SCHEDULE:-0 0 2 * * *}
      SPIS_PROCESSING_RUN_ON_START: ${SPIS_PROCESSING_RUN_ON_START:-false}
      SPIS_FEATURE_FAVORITE: "true"
      SPIS_FEATURE_ARCHIVE: "true"
      SPIS_FEATURE_FOLLOW_SYMLINKS: "true"
      RUST_LOG: ${RUST_LOG:-error,spis=info}
    volumes:
      - ${DATA_DIR:-./data}:/var/lib/spis/data
      - ${MEDIA_DIR:-./media}:/var/lib/spis/media

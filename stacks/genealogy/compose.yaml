services:
  app:
    image: familytree365/genealogy:latest
    container_name: genealogy-app
    restart: unless-stopped
    working_dir: /var/www
    environment:
      - SERVICE_NAME=app
      - DB_HOST=db
      - DB_DATABASE=${DB_DATABASE:-genealogy}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis
    networks:
      - genealogy

  webserver:
    image: nginx:alpine
    container_name: genealogy-webserver
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - genealogy

  db:
    image: mysql:8.0
    container_name: genealogy-db
    restart: unless-stopped
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-genealogy}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - genealogy

  redis:
    image: bitnami/redis:latest
    container_name: genealogy-redis
    restart: unless-stopped
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    networks:
      - genealogy

networks:
  genealogy:

volumes:
  db-data:

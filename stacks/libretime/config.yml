# LibreTime configuration
# See https://libretime.org/docs/admin-manual/setup/configuration/

general:
  public_url: http://localhost:8080
  secret_key: changeme_generate_a_random_secret_key
  timezone: UTC

storage:
  path: /srv/libretime

database:
  host: postgres
  port: 5432
  name: libretime
  user: libretime
  password: changeme_postgres_pass

rabbitmq:
  host: rabbitmq
  port: 5672
  vhost: /libretime
  user: libretime
  password: changeme_rabbitmq_pass

playout:
  liquidsoap_host: liquidsoap
  liquidsoap_port: 1234

stream:
  outputs:
    icecast:
      - enabled: true
        host: icecast
        port: 8000
        mount: main
        source_password: changeme_source_pass

services:
  blackcandy:
    image: ghcr.io/blackcandy-org/blackcandy:${BLACKCANDY_VERSION:-latest}
    container_name: black-candy
    restart: unless-stopped
    ports:
      - "${BLACKCANDY_PORT:-3000}:3000"
    environment:
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      MEDIA_PATH: /media_data
    volumes:
      - ./music:/media_data
      - blackcandy_data:/app/storage
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:${POSTGRES_VERSION:-16-alpine}
    container_name: black-candy-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:${REDIS_VERSION:-7-alpine}
    container_name: black-candy-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  blackcandy_data:
  postgres_data:
  redis_data:

services:
  turtl-server:
    image: turtl/server:latest
    container_name: turtl-server
    restart: unless-stopped
    ports:
      - "${TURTL_PORT:-8182}:8181"
    environment:
      - TURTL_DB_HOST=postgres
      - TURTL_DB_PORT=5432
      - TURTL_DB_DATABASE=${POSTGRES_DB}
      - TURTL_DB_USER=${POSTGRES_USER}
      - TURTL_DB_PASSWORD=${POSTGRES_PASSWORD}
      - TURTL_APP_SECURE_HASH_SALT=${TURTL_HASH_SALT}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:11-alpine
    container_name: turtl-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

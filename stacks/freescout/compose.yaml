services:
  freescout-app:
    image: tiredofit/freescout:latest
    volumes:
      - data:/data
      - logs:/www/logs
    environment:
      - TIMEZONE=America/Vancouver
      - DB_HOST=freescout-db
      - DB_NAME=freescout
      - DB_USER=freescout
      - DB_PASS=freescout
      - SITE_URL=http://localhost:8080
      - ADMIN_EMAIL=admin@admin.com
      - ADMIN_PASS=freescout
      - DISPLAY_ERRORS=FALSE
      - ENABLE_SSL_PROXY=FALSE
    ports:
      - "8080:80"
    depends_on:
      - freescout-db
    restart: unless-stopped

  freescout-db:
    image: tiredofit/mariadb:latest
    volumes:
      - db:/var/lib/mysql
    environment:
      - TIMEZONE=America/Vancouver
      - ROOT_PASS=password
      - DB_NAME=freescout
      - DB_USER=freescout
      - DB_PASS=freescout
    restart: unless-stopped

volumes:
  data:
  logs:
  db:

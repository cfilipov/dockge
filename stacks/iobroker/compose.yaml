services:
  iobroker:
    image: iobroker/iobroker:${IOBROKER_VERSION:-latest}
    container_name: iobroker
    restart: unless-stopped
    hostname: iobroker
    ports:
      - "${IOBROKER_ADMIN_PORT:-8081}:8081"
      - "${IOBROKER_WEB_PORT:-8082}:8082"
    volumes:
      - iobroker-data:/opt/iobroker
    environment:
      TZ: ${TZ:-UTC}
      LANG: ${LANG:-en_US.UTF-8}

volumes:
  iobroker-data:

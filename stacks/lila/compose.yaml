services:
  lila:
    image: ghcr.io/lichess-org/lila-docker:main
    container_name: lila
    restart: unless-stopped
    ports:
      - "${LILA_PORT:-8080}:8080"
    environment:
      - LILA_DOMAIN=${LILA_DOMAIN:-localhost:8080}
      - LILA_URL=${LILA_URL:-http://localhost:8080}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started

  mongodb:
    image: mongo:8.2.5-noble
    container_name: lila-mongodb
    restart: unless-stopped
    command: mongod --bind_ip_all --replSet rs0
    healthcheck:
      test: mongosh --quiet --eval "rs.status().ok || rs.initiate().ok"
      interval: 5s
      timeout: 30s
      start_period: 0s
      retries: 30
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:8.0.3-alpine3.21
    container_name: lila-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  mongodb_data:
  redis_data:

services:
  fossbilling:
    image: fossbilling/fossbilling:latest
    restart: always
    ports:
      - "${PORT:-80}:80"
    volumes:
      - fossbilling-data:/var/www/html
    depends_on:
      - mysql

  mysql:
    image: mysql:8.2
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_RANDOM_ROOT_PASSWORD: "1"
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  fossbilling-data:
  mysql-data:

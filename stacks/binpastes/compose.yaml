services:
  binpastes:
    image: ghcr.io/querwurzel/binpastes:latest
    container_name: binpastes
    restart: unless-stopped
    ports:
      - "${BINPASTES_PORT:-8080}:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=mysql
      - MYSQL_HOST=db
      - MYSQL_DATABASE=${MYSQL_DATABASE:-binpastes}
      - MYSQL_USERNAME=${MYSQL_USERNAME:-binpastes}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-binpastes}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: binpastes-db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-rootpassword}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-binpastes}
      - MYSQL_USER=${MYSQL_USERNAME:-binpastes}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-binpastes}
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db-data:

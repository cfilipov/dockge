# Battle for Wesnoth Multiplayer Server Configuration
# See: https://wiki.wesnoth.org/ServerAdministration

[server]
    connections_allowed=100
    disallow_names="*admin*,*moderator*,*server*,*AI*"
    max_messages=4
    max_messages_lobby=4
    messages_time_period=10
    motd="Welcome to the Wesnoth multiplayer server!"
    new_room_policy=open
    port=15000
    versions_accepted="*"
[/server]

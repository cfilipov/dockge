services:
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    restart: unless-stopped
    ports:
      - "${FILEBROWSER_PORT:-8080}:80"
    volumes:
      - data:/srv
      - db:/database
      - ./filebrowser.json:/.filebrowser.json:ro
    environment:
      - TZ=${TZ:-UTC}

volumes:
  data:
  db:

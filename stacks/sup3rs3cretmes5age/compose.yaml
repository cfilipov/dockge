services:
  vault:
    image: hashicorp/vault:latest
    container_name: vault
    restart: unless-stopped
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=${VAULT_TOKEN:-supersecret}
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://localhost:8200"]
      interval: 30s
      timeout: 10s
      retries: 3

  supersecret:
    image: algolia/supersecretmessage:latest
    container_name: supersecret
    restart: unless-stopped
    ports:
      - "${SUPERSECRET_PORT:-8082}:8082"
    environment:
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=${VAULT_TOKEN:-supersecret}
      - SUPERSECRETMESSAGE_HTTP_BINDING_ADDRESS=:8082
      - SUPERSECRETMESSAGE_HTTPS_REDIRECT_ENABLED=false
    depends_on:
      vault:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3

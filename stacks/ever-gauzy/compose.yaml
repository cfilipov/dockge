services:
  db:
    image: postgres:17-alpine
    container_name: gauzy-db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-gauzy}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-gauzy_password}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "5432:5432"
    networks:
      - overlay

  api:
    container_name: gauzy-api
    image: ghcr.io/ever-co/gauzy-api:latest
    environment:
      API_HOST: ${API_HOST:-api}
      API_PORT: ${API_PORT:-3000}
      NODE_ENV: ${NODE_ENV:-development}
      DB_HOST: db
      DB_NAME: ${DB_NAME:-gauzy}
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS:-gauzy_password}
      DB_PORT: "5432"
      DB_TYPE: postgres
      API_BASE_URL: ${API_BASE_URL:-http://localhost:3000}
      CLIENT_BASE_URL: ${CLIENT_BASE_URL:-http://localhost:4200}
    entrypoint: "./entrypoint.compose.sh"
    command: ["node", "main.js"]
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
    links:
      - db:${DB_HOST:-db}
    ports:
      - "3000:${API_PORT:-3000}"
    networks:
      - overlay

  webapp:
    container_name: gauzy-webapp
    image: ghcr.io/ever-co/gauzy-webapp:latest
    environment:
      WEB_HOST: ${WEB_HOST:-webapp}
      WEB_PORT: ${WEB_PORT:-4200}
      NODE_ENV: ${NODE_ENV:-development}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:3000}
      CLIENT_BASE_URL: ${CLIENT_BASE_URL:-http://localhost:4200}
      DEMO: "true"
      API_HOST: ${API_HOST:-api}
      API_PORT: ${API_PORT:-3000}
    entrypoint: "./entrypoint.compose.sh"
    command: ["nginx", "-g", "daemon off;"]
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
    ports:
      - "4200:${UI_PORT:-4200}"
    networks:
      - overlay

volumes:
  postgres_data: {}

networks:
  overlay:
    driver: bridge

services:
  freshrss:
    image: freshrss/freshrss:${FRESHRSS_TAG:-latest}
    container_name: freshrss
    hostname: freshrss
    restart: unless-stopped
    ports:
      - "${FRESHRSS_PORT:-8080}:80"
    logging:
      options:
        max-size: 10m
    volumes:
      - freshrss_data:/var/www/FreshRSS/data
      - freshrss_extensions:/var/www/FreshRSS/extensions
    environment:
      - TZ=${TZ:-Europe/London}
      - CRON_MIN=3,33
      - TRUSTED_PROXY=172.16.0.1/12 192.168.0.1/16

volumes:
  freshrss_data:
  freshrss_extensions:

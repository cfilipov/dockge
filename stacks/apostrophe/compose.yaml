services:
  apostrophe:
    image: node:18-alpine
    container_name: apostrophe
    ports:
      - "3000:3000"
    environment:
      APOS_MONGODB_URI: mongodb://mongo:27017/apostrophe
      NODE_ENV: production
    depends_on:
      - mongo
    volumes:
      - apostrophe_data:/app/public/uploads
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: apostrophe-mongo
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  apostrophe_data:
  mongo_data:

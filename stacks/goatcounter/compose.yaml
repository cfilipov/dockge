services:
  goatcounter:
    image: arp242/goatcounter:latest
    container_name: goatcounter
    ports:
      - "8080:8080"
    environment:
      - GOATCOUNTER_DB=postgresql+postgresql://goatcounter:${DB_PASSWORD}@postgres:5432/goatcounter?sslmode=disable
      - GOATCOUNTER_LISTEN=:8080
    depends_on:
      - postgres
    volumes:
      - goatcounter-data:/home/goatcounter/goatcounter-data
    restart: unless-stopped

  postgres:
    image: postgres:18-alpine
    container_name: goatcounter-postgres
    environment:
      - POSTGRES_USER=goatcounter
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=goatcounter
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  goatcounter-data:
  postgres-data:

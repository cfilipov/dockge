services:
  emailrelay:
    image: dcagatay/emailrelay:latest
    container_name: emailrelay
    command: --forward-on-disconnect --forward-to mailpit:1025
    ports:
      - "25:25"
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit
    container_name: emailrelay-mailpit
    logging:
      driver: "none"
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

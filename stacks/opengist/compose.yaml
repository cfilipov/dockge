services:
  opengist:
    image: ghcr.io/thomiceli/opengist:1.12
    container_name: opengist
    restart: unless-stopped
    ports:
      - "${OPENGIST_HTTP_PORT:-6157}:6157"
      - "${OPENGIST_SSH_PORT:-2222}:2222"
    volumes:
      - ./data:/opengist
    environment:
      - UID=${UID:-1000}
      - GID=${GID:-1000}

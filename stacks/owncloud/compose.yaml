services:
  owncloud:
    image: owncloud/server:${OWNCLOUD_VERSION}
    restart: unless-stopped
    ports:
      - "${OWNCLOUD_PORT}:8080"
    environment:
      OWNCLOUD_DOMAIN: ${OWNCLOUD_DOMAIN}
      OWNCLOUD_TRUSTED_DOMAINS: ${OWNCLOUD_DOMAIN}
      OWNCLOUD_DB_TYPE: mysql
      OWNCLOUD_DB_NAME: ${MYSQL_DATABASE}
      OWNCLOUD_DB_USERNAME: ${MYSQL_USER}
      OWNCLOUD_DB_PASSWORD: ${MYSQL_PASSWORD}
      OWNCLOUD_DB_HOST: db
      OWNCLOUD_ADMIN_USERNAME: ${ADMIN_USER}
      OWNCLOUD_ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      OWNCLOUD_MYSQL_UTF8MB4: "true"
      OWNCLOUD_REDIS_ENABLED: "true"
      OWNCLOUD_REDIS_HOST: redis
    volumes:
      - owncloud-data:/mnt/data
    depends_on:
      - db
      - redis
    healthcheck:
      test: ["CMD", "/usr/bin/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5

  db:
    image: mariadb:${MARIADB_VERSION}
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command: --max-allowed-packet=128M --innodb-log-file-size=64M
    volumes:
      - owncloud-db:/var/lib/mysql

  redis:
    image: redis:${REDIS_VERSION}
    restart: unless-stopped
    command: --databases 1
    volumes:
      - owncloud-redis:/data

volumes:
  owncloud-data:
  owncloud-db:
  owncloud-redis:

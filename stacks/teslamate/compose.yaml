services:
  teslamate:
    image: teslamate/teslamate:latest
    restart: always
    environment:
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-please-change-me}
      - DATABASE_USER=${DATABASE_USER:-teslamate}
      - DATABASE_PASS=${DATABASE_PASS:-teslamate_secret}
      - DATABASE_NAME=${DATABASE_NAME:-teslamate}
      - DATABASE_HOST=database
      - MQTT_HOST=mosquitto
    ports:
      - "${TESLAMATE_PORT:-4000}:4000"
    volumes:
      - ./import:/opt/app/import
    cap_drop:
      - all

  database:
    image: postgres:17
    restart: always
    environment:
      - POSTGRES_USER=${DATABASE_USER:-teslamate}
      - POSTGRES_PASSWORD=${DATABASE_PASS:-teslamate_secret}
      - POSTGRES_DB=${DATABASE_NAME:-teslamate}
    volumes:
      - teslamate-db:/var/lib/postgresql/data

  grafana:
    image: teslamate/grafana:latest
    restart: always
    environment:
      - DATABASE_USER=${DATABASE_USER:-teslamate}
      - DATABASE_PASS=${DATABASE_PASS:-teslamate_secret}
      - DATABASE_NAME=${DATABASE_NAME:-teslamate}
      - DATABASE_HOST=database
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - teslamate-grafana-data:/var/lib/grafana

  mosquitto:
    image: eclipse-mosquitto:2
    restart: always
    command: mosquitto -c /mosquitto-no-auth.conf
    volumes:
      - mosquitto-conf:/mosquitto/config
      - mosquitto-data:/mosquitto/data

volumes:
  teslamate-db:
  teslamate-grafana-data:
  mosquitto-conf:
  mosquitto-data:

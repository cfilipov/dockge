services:
  reviewboard:
    image: beanbag/reviewboard:${RB_VERSION:-7.0}
    restart: unless-stopped
    depends_on:
      - db
      - memcached
    environment:
      DATABASE_TYPE: postgresql
      COMPANY: ${COMPANY}
      DATABASE_USERNAME: ${DB_USER}
      DATABASE_PASSWORD: ${DB_PASSWORD}
      DOMAIN: ${DOMAIN}
    volumes:
      - sitedir:/site

  db:
    image: postgres:13-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_ADMIN_USER}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
      POSTGRES_DB: reviewboard
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./init-reviewboard-db.sh:/docker-entrypoint-initdb.d/init-reviewboard-db.sh

  memcached:
    image: memcached:alpine
    restart: unless-stopped
    entrypoint:
      - memcached
      - -m
      - "${MEMCACHED_MB:-128}"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - reviewboard
    ports:
      - "${HTTP_PORT:-8085}:80"
    environment:
      NGINX_HOST: ${DOMAIN}
      NGINX_PORT: "80"
    volumes:
      - sitedir:/var/www/reviewboard
      - ./nginx_templates:/etc/nginx/templates

volumes:
  db_data:
  sitedir:

services:
  elixire:
    image: python:3.11-slim
    container_name: elixire
    restart: unless-stopped
    ports:
      - "${ELIXIRE_PORT:-8000}:8000"
    volumes:
      - uploads:/app/uploads
      - ./config.py:/app/config.py:ro
    environment:
      TZ: ${TZ:-UTC}
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    container_name: elixire-postgres
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-elixire}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-elixire}

  redis:
    image: redis:7-alpine
    container_name: elixire-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data

volumes:
  uploads:
  postgres-data:
  redis-data:

services:
  xandikos:
    image: ghcr.io/jelmer/xandikos
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - data:/data
    environment:
      - AUTOCREATE=true
      - DEFAULTS=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

volumes:
  data:

services:
  forgejo:
    image: codeberg.org/forgejo/forgejo:${FORGEJO_VERSION:-10}
    container_name: forgejo
    restart: unless-stopped
    ports:
      - "${FORGEJO_HTTP_PORT:-3000}:3000"
      - "${FORGEJO_SSH_PORT:-2222}:22"
    volumes:
      - forgejo-data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - FORGEJO__database__DB_TYPE=${DB_TYPE:-sqlite3}

volumes:
  forgejo-data:

services:
  clipbucket:
    image: xuping/clipbucket:latest
    container_name: clipbucket
    restart: unless-stopped
    ports:
      - "${CLIPBUCKET_PORT:-8080}:80"
    environment:
      - MYSQL_HOST=db
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
    volumes:
      - clipbucket_data:/var/www/html/files
      - clipbucket_uploads:/var/www/html/uploads
    depends_on:
      - db

  db:
    image: mysql:5.7
    container_name: clipbucket-db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
    volumes:
      - db_data:/var/lib/mysql

volumes:
  clipbucket_data:
  clipbucket_uploads:
  db_data:

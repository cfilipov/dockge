services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: spip
      MYSQL_USER: spip
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql

  app:
    image: ipeos/spip:4.4
    restart: unless-stopped
    depends_on:
      - db
    environment:
      SPIP_AUTO_INSTALL: "1"
      SPIP_DB_SERVER: mysql
      SPIP_DB_LOGIN: spip
      SPIP_DB_PASS: ${MYSQL_PASSWORD}
      SPIP_DB_NAME: spip
      SPIP_SITE_ADDRESS: http://localhost:8880
    ports:
      - "8880:80"

volumes:
  db_data:

services:
  ombi:
    image: lscr.io/linuxserver/ombi:latest
    container_name: ombi
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Etc/UTC}
      - BASE_URL=${BASE_URL:-/}
    volumes:
      - ./config:/config
    ports:
      - "${PORT:-3579}:3579"
    restart: unless-stopped

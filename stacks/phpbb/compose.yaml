services:
  phpbb:
    image: bitnami/phpbb:3
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      PHPBB_DATABASE_HOST: db
      PHPBB_DATABASE_PORT_NUMBER: 3306
      PHPBB_DATABASE_NAME: phpbb
      PHPBB_DATABASE_USER: phpbb
      PHPBB_DATABASE_PASSWORD: ${DB_PASSWORD}
      PHPBB_USERNAME: ${PHPBB_USERNAME}
      PHPBB_PASSWORD: ${PHPBB_PASSWORD}
      PHPBB_EMAIL: ${PHPBB_EMAIL}
      PHPBB_FORUM_NAME: ${PHPBB_FORUM_NAME}
    volumes:
      - phpbb-data:/bitnami/phpbb

  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: phpbb
      MARIADB_USER: phpbb
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql

volumes:
  phpbb-data:
  db-data:

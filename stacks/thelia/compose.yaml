services:
  webserver:
    image: nginx:alpine
    ports:
      - "${WEB_PORT:-8080}:80"
    restart: unless-stopped
    depends_on:
      - php-fpm
    volumes:
      - app_data:/application
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

  php-fpm:
    image: php:8.2-fpm
    restart: unless-stopped
    depends_on:
      - mariadb
    environment:
      DATABASE_HOST: mariadb
      DATABASE_NAME: ${MYSQL_DATABASE:-thelia}
      DATABASE_USER: ${MYSQL_USER:-thelia}
      DATABASE_PASSWORD: ${MYSQL_PASSWORD:-thelia}
    volumes:
      - app_data:/application

  mariadb:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-thelia}
      MYSQL_USER: ${MYSQL_USER:-thelia}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-thelia}
    volumes:
      - db_data:/var/lib/mysql

volumes:
  app_data:
  db_data:

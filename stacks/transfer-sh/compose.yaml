services:
  transfer-sh:
    image: dutchcoders/transfer.sh:latest
    container_name: transfer-sh
    restart: unless-stopped
    ports:
      - "${TRANSFER_PORT:-8080}:8080"
    command:
      - --provider=local
      - --basedir=/data
      - --listener=:8080
    environment:
      HTTP_AUTH_USER: ${HTTP_AUTH_USER}
      HTTP_AUTH_PASS: ${HTTP_AUTH_PASS}
    volumes:
      - transfer-data:/data

volumes:
  transfer-data:

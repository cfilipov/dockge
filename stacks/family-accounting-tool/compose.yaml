services:
  db:
    image: mariadb:10.3
    restart: always
    volumes:
      - db-data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}

  web:
    image: nymanjens/facto:latest
    restart: always
    depends_on:
      - db
    ports:
      - "${PORT:-9000}:9000"
    environment:
      APPLICATION_SECRET: ${APPLICATION_SECRET}
      DATABASE_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE}?user=root&password=${MYSQL_ROOT_PASSWORD}&disableMariaDbDriver

volumes:
  db-data:

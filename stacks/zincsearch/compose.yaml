services:
  zincsearch:
    image: public.ecr.aws/zinclabs/zincsearch:${ZINC_TAG}
    container_name: zincsearch
    ports:
      - "${ZINC_PORT}:4080"
    volumes:
      - zinc-data:/data
    environment:
      ZINC_FIRST_ADMIN_USER: ${ZINC_FIRST_ADMIN_USER}
      ZINC_FIRST_ADMIN_PASSWORD: ${ZINC_FIRST_ADMIN_PASSWORD}
      ZINC_DATA_PATH: /data
    restart: unless-stopped

volumes:
  zinc-data:

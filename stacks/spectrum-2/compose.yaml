services:
  spectrum:
    image: spectrum2/spectrum:master
    restart: unless-stopped
    container_name: spectrum
    ports:
      - "${SPECTRUM_PORT:-8080}:8080"
    volumes:
      - ./config:/etc/spectrum2:ro
      - ./data:/var/lib/spectrum2
      - ./media:/var/lib/spectrum2/media
    depends_on:
      prosody:
        condition: service_started
      nginx:
        condition: service_started

  prosody:
    image: spectrum2/prosody:latest
    restart: unless-stopped
    container_name: prosody
    ports:
      - "${PROSODY_C2S_PORT:-5222}:5222"
      - "${PROSODY_COMPONENT_PORT:-5347}:5347"
    environment:
      LOCAL: ${PROSODY_ADMIN:-admin}
      DOMAIN: ${PROSODY_DOMAIN:-localhost}
      PASSWORD: ${PROSODY_PASSWORD:-secret}
    volumes:
      - prosody-data:/var/lib/prosody

  nginx:
    image: spectrum2/nginx:latest
    restart: unless-stopped
    container_name: spectrum-nginx
    ports:
      - "${NGINX_PORT:-8081}:80"
    volumes:
      - ./media:/var/www/html:ro

volumes:
  prosody-data:

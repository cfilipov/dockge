services:
  janus:
    image: canyan/janus-gateway:master
    container_name: janus-gateway
    restart: unless-stopped
    ports:
      - "${JANUS_HTTP_PORT:-8088}:8088"
      - "${JANUS_HTTPS_PORT:-8089}:8089"
      - "${JANUS_ADMIN_PORT:-7088}:7088"
      - "${JANUS_WS_PORT:-8188}:8188"
      - "${JANUS_RTP_START:-10000}:10000/udp"
      - "${JANUS_RTP_END:-10001}:10001/udp"
    volumes:
      - janus-config:/usr/local/etc/janus

volumes:
  janus-config:

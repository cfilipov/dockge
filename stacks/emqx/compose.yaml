services:
  emqx:
    image: emqx/emqx:${EMQX_VERSION:-latest}
    container_name: emqx
    restart: unless-stopped
    ports:
      - "${EMQX_MQTT_PORT:-1883}:1883"
      - "${EMQX_MQTTS_PORT:-8883}:8883"
      - "${EMQX_WS_PORT:-8083}:8083"
      - "${EMQX_WSS_PORT:-8084}:8084"
      - "${EMQX_DASHBOARD_PORT:-18083}:18083"
    volumes:
      - emqx-data:/opt/emqx/data
      - emqx-log:/opt/emqx/log
    environment:
      EMQX_NAME: emqx
      EMQX_HOST: 127.0.0.1
      EMQX_DASHBOARD__DEFAULT_USERNAME: ${EMQX_ADMIN_USER:-admin}
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_ADMIN_PASSWORD:-public}
    healthcheck:
      test: ["CMD", "emqx", "ctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  emqx-data:
  emqx-log:

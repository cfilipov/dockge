version: '3'

vars:
  BINARY: dockge

tasks:
  default:
    desc: Show available tasks
    silent: true
    cmd: task --list

  setup:
    desc: Install all dependencies (first-time dev setup)
    cmds:
      - cd web && pnpm install
      - cd web-svelte && pnpm install
      - cd e2e && pnpm install
      - cd e2e && npx playwright install chromium
      - cd mock-docker && npm install
      - cd ws-test && pnpm install

  build:
    desc: Build everything
    deps: [build-web, build-go]

  build-web:
    desc: Build frontend (Vite → dist/)
    dir: web
    cmd: pnpm run build

  build-go:
    desc: Build Go backend
    cmd: go build -o bin/{{.BINARY}} .
    sources:
      - '**/*.go'
      - go.mod
      - go.sum
    generates:
      - bin/{{.BINARY}}

  build-mock-docker:
    desc: Build mock docker CLI binary
    dir: mock-docker
    cmds:
      - npm run build:cli
      - cp dist/docker ../bin/docker

  build-mock-daemon:
    desc: Build TypeScript mock daemon
    dir: mock-docker
    cmds:
      - npm install --prefer-offline
      - npm run build
      - npm run build:daemon
      - cp dist/mock-daemon ../bin/mock-daemon

  dev:
    desc: Run mock daemon + Go backend + Vite HMR (ports 5001 + 5000)
    deps: [dev-go, dev-web]

  dev-web:
    desc: Run Vite dev server only (port 5000)
    dir: web
    cmd: pnpm run dev

  dev-go:
    desc: Run mock daemon + Go backend only (port 5001)
    deps: [build-go, build-mock-daemon, build-mock-docker]
    cmds:
      - cmd: |
          trap 'kill 0' EXIT
          rm -rf .run/dev-5001 && mkdir -p .run/dev-5001/data
          MOCK_SOCK="/tmp/dockge-mock-$$/docker.sock"
          mkdir -p "$(dirname "$MOCK_SOCK")"
          node mock-docker/dist/src/main.js \
            --socket "$MOCK_SOCK" \
            --stacks-source test-data/stacks \
            --stacks-dir .run/dev-5001/stacks \
            --images-json mock-docker/scripts/images.json &
          for i in $(seq 1 50); do [ -S "$MOCK_SOCK" ] && break; sleep 0.1; done
          export DOCKER_HOST="unix://$MOCK_SOCK"
          export PATH="$(pwd)/bin:$PATH"
          cp ./bin/{{.BINARY}} .run/dev-5001/{{.BINARY}}
          .run/dev-5001/{{.BINARY}} --dev --port 5001 --data-dir .run/dev-5001/data --stacks-dir .run/dev-5001/stacks

  start-mock-env:
    desc: Start mock daemon + dockge for dev/test (callers must build deps first)
    vars:
      PORT: '{{.PORT | default "5001"}}'
      STACKS_DIR: '{{.STACKS_DIR | default ".run/e2e-{{.PORT}}/stacks"}}'
      DATA_DIR: '{{.DATA_DIR | default ".run/e2e-{{.PORT}}/data"}}'
    cmds:
      - cmd: |
          trap 'kill 0' EXIT
          MOCK_SOCK="/tmp/dockge-mock-$$/docker.sock"
          mkdir -p "$(dirname "$MOCK_SOCK")"
          mkdir -p {{.DATA_DIR}}
          node mock-docker/dist/src/main.js \
            --socket "$MOCK_SOCK" \
            --stacks-source test-data/stacks \
            --stacks-dir {{.STACKS_DIR}} \
            --images-json mock-docker/scripts/images.json \
            --e2e &
          for i in $(seq 1 50); do [ -S "$MOCK_SOCK" ] && break; sleep 0.1; done
          DOCKGE_SRC=${DOCKGE_BIN:-./bin/{{.BINARY}}}
          DOCKGE_RUN=.run/e2e-{{.PORT}}/dockge
          cp "$DOCKGE_SRC" "$DOCKGE_RUN"
          DOCKER_HOST="unix://$MOCK_SOCK" PATH="$(pwd)/bin:$PATH" \
            exec "$DOCKGE_RUN" --dev --port {{.PORT}} --data-dir {{.DATA_DIR}} --stacks-dir {{.STACKS_DIR}}

  dev-svelte:
    desc: Run mock daemon + Go backend + Svelte Vite HMR (ports 6001 + 6100)
    deps: [dev-svelte-go, dev-svelte-web]

  dev-svelte-web:
    desc: Run Svelte Vite dev server only (port 6100)
    dir: web-svelte
    cmd: pnpm run dev

  dev-svelte-go:
    desc: Run mock daemon + Go backend for Svelte (port 6001)
    deps: [build-go, build-mock-daemon, build-mock-docker]
    cmds:
      - cmd: |
          trap 'kill 0' EXIT
          rm -rf .run/dev-6001 && mkdir -p .run/dev-6001/data
          MOCK_SOCK="/tmp/dockge-mock-$$/docker.sock"
          mkdir -p "$(dirname "$MOCK_SOCK")"
          node mock-docker/dist/src/main.js \
            --socket "$MOCK_SOCK" \
            --stacks-source test-data/stacks \
            --stacks-dir .run/dev-6001/stacks \
            --images-json mock-docker/scripts/images.json &
          for i in $(seq 1 50); do [ -S "$MOCK_SOCK" ] && break; sleep 0.1; done
          export DOCKER_HOST="unix://$MOCK_SOCK"
          export PATH="$(pwd)/bin:$PATH"
          cp ./bin/{{.BINARY}} .run/dev-6001/{{.BINARY}}
          .run/dev-6001/{{.BINARY}} --dev --port 6001 --data-dir .run/dev-6001/data --stacks-dir .run/dev-6001/stacks

  build-svelte:
    desc: Build Svelte frontend (Vite → dist-svelte/)
    dir: web-svelte
    cmd: pnpm run build

  check-svelte:
    desc: Svelte type check
    dir: web-svelte
    cmd: pnpm run check

  storybook:
    desc: Run Storybook for Svelte components
    dir: web-svelte
    cmd: pnpm storybook

  build-storybook:
    desc: Build static Storybook site
    dir: web-svelte
    cmd: pnpm build-storybook

  kill:
    desc: Kill any running dockge backend or Vite dev server
    ignore_error: true
    cmds:
      - cmd: pkill -f './bin/{{.BINARY}}' 2>/dev/null
        ignore_error: true
      - cmd: pkill -f './bin/dockge-rust' 2>/dev/null
        ignore_error: true
      - cmd: pkill -f '.run/.*/dockge' 2>/dev/null
        ignore_error: true
      - cmd: pkill -f 'node.*vite' 2>/dev/null
        ignore_error: true
      - cmd: pkill -f 'node.*mock-docker' 2>/dev/null
        ignore_error: true

  clean:
    desc: Remove build artifacts
    cmd: rm -rf dist bin .run .e2e-output

  check-ts:
    desc: TypeScript type check (tsc --noEmit)
    dir: web
    cmd: pnpm run check-ts

  lint:
    desc: Lint frontend and Go code
    cmds:
      - cmd: pnpm run lint
        dir: web
      - go vet ./...

  fmt:
    desc: Format frontend and Go code
    cmds:
      - cmd: pnpm run fmt
        dir: web
      - gofmt -w .

  test:
    desc: Run all tests
    deps: [test-go, test-ws, test-e2e]

  test-go:
    desc: Run Go tests with race detector
    deps: [build-mock-daemon, build-mock-docker]
    cmds:
      - go test -race -count=1 . -args -mock-daemon=./bin/mock-daemon -mock-docker=./bin/docker
      - go test -race -count=1 ./internal/...

  setup-ws-test:
    desc: Install ws-test dependencies
    dir: ws-test
    cmd: pnpm install

  test-ws:
    desc: Run WebSocket protocol tests
    deps: [build-go, build-mock-daemon, build-mock-docker]
    dir: ws-test
    cmd: pnpm test

  test-e2e:
    desc: Run Playwright E2E tests
    deps: [build-web, build-go, build-mock-daemon, build-mock-docker]
    dir: e2e
    cmd: E2E_PORT=5052 pnpm test

  test-e2e-rust:
    desc: Run Playwright E2E tests against Rust backend
    deps: [build-web, build-rust, build-mock-daemon, build-mock-docker]
    dir: e2e
    cmd: DOCKGE_BIN=./bin/dockge-rust E2E_PORT=5052 pnpm test

  test-e2e-report:
    desc: Show Playwright HTML report with screenshot diffs
    dir: e2e
    cmd: pnpm run test:report

  update-screenshots:
    desc: Update E2E golden screenshots
    deps: [build-web, build-go, build-mock-daemon, build-mock-docker]
    dir: e2e
    cmd: E2E_PORT=5052 pnpm run test:update-screenshots

  update-screenshots-rust:
    desc: Update E2E golden screenshots (Rust backend)
    deps: [build-web, build-rust, build-mock-daemon, build-mock-docker]
    dir: e2e
    cmd: DOCKGE_BIN=./bin/dockge-rust E2E_PORT=5052 pnpm run test:update-screenshots

  update-benchmarks:
    desc: Update E2E performance golden baselines (requires full test run)
    deps: [build-web, build-go, build-mock-daemon, build-mock-docker]
    dir: e2e
    cmd: E2E_PORT=5052 UPDATE_BENCHMARKS=1 pnpm test

  test-e2e-trace:
    desc: Run E2E test with tracing (use -- <test-file>)
    deps: [build-web, build-go, build-mock-daemon, build-mock-docker]
    dir: e2e
    cmd: E2E_PORT=5052 npx playwright test {{.CLI_ARGS}} --trace on

  test-bun:
    desc: Run Bun backend tests
    dir: backend-bun
    cmd: bun test

  dev-bun:
    desc: Run mock daemon + Bun backend on :5002
    deps: [build-mock-daemon, build-mock-docker]
    cmds:
      - cmd: |
          trap 'kill 0' EXIT
          rm -rf .run/dev-5002 && mkdir -p .run/dev-5002/data
          MOCK_SOCK="/tmp/dockge-mock-$$/docker.sock"
          mkdir -p "$(dirname "$MOCK_SOCK")"
          node mock-docker/dist/src/main.js \
            --socket "$MOCK_SOCK" \
            --stacks-source test-data/stacks \
            --stacks-dir .run/dev-5002/stacks \
            --images-json mock-docker/scripts/images.json &
          for i in $(seq 1 50); do [ -S "$MOCK_SOCK" ] && break; sleep 0.1; done
          export DOCKER_HOST="unix://$MOCK_SOCK"
          export PATH="$(pwd)/bin:$PATH"
          cd backend-bun && bun run src/main.ts -- --dev --port 5002 --data-dir ../.run/dev-5002/data --stacks-dir ../.run/dev-5002/stacks

  build-rust:
    desc: Build Rust backend (musl static binary, release)
    dir: backend-rust
    cmds:
      - cargo build --release --target x86_64-unknown-linux-musl
      - rm -f ../bin/dockge-rust && cp target/x86_64-unknown-linux-musl/release/dockge-rust ../bin/dockge-rust
    sources:
      - 'src/**/*.rs'
      - Cargo.toml
      - Cargo.lock
    generates:
      - ../bin/dockge-rust

  build-rust-dev:
    desc: Build Rust backend (musl debug binary, fast compile)
    dir: backend-rust
    cmds:
      - cargo build --target x86_64-unknown-linux-musl
      - rm -f ../bin/dockge-rust && cp target/x86_64-unknown-linux-musl/debug/dockge-rust ../bin/dockge-rust
    sources:
      - 'src/**/*.rs'
      - Cargo.toml
      - Cargo.lock
    generates:
      - ../bin/dockge-rust

  test-ws-rust:
    desc: Run WebSocket protocol tests against Rust backend
    deps: [build-rust-dev, build-mock-daemon, build-mock-docker]
    dir: ws-test
    cmd: DOCKGE_BIN=../bin/dockge-rust pnpm test

  test-ws-rust-noauth:
    desc: Run WebSocket no-auth mode tests against Rust backend
    deps: [build-rust-dev, build-mock-daemon, build-mock-docker]
    dir: ws-test
    cmd: DOCKGE_BIN=../bin/dockge-rust DOCKGE_NO_AUTH=1 pnpm test

  dev-rust:
    desc: Run mock daemon + Rust backend + Vite HMR (ports 5003 + 5000)
    deps: [dev-rust-backend, dev-rust-web]

  dev-rust-web:
    desc: Run Vite dev server for Rust backend (port 5000, proxies to 5003)
    dir: web
    cmd: VITE_BACKEND_PORT=5003 pnpm run dev

  dev-rust-backend:
    desc: Run mock daemon + Rust backend only (port 5003)
    deps: [build-rust-dev, build-mock-daemon, build-mock-docker]
    cmds:
      - cmd: |
          trap 'kill 0' EXIT
          rm -rf .run/dev-5003 && mkdir -p .run/dev-5003/data
          MOCK_SOCK="/tmp/dockge-mock-$$/docker.sock"
          mkdir -p "$(dirname "$MOCK_SOCK")"
          node mock-docker/dist/src/main.js \
            --socket "$MOCK_SOCK" \
            --stacks-source test-data/stacks \
            --stacks-dir .run/dev-5003/stacks \
            --images-json mock-docker/scripts/images.json &
          for i in $(seq 1 50); do [ -S "$MOCK_SOCK" ] && break; sleep 0.1; done
          export DOCKER_HOST="unix://$MOCK_SOCK"
          export PATH="$(pwd)/bin:$PATH"
          cp ./bin/dockge-rust .run/dev-5003/dockge-rust
          .run/dev-5003/dockge-rust --dev --port 5003 --data-dir .run/dev-5003/data --stacks-dir .run/dev-5003/stacks

  docker:
    desc: Build Docker image
    cmd: docker buildx build -f docker/Dockerfile -t cfilipov/dockge:latest --target release .

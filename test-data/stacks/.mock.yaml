images:
  nginx:latest:
    update_available: true
  wordpress:6.4:
    update_available: true

networks:
  proxy:
    driver: bridge
    subnet: 172.30.0.0/16
    gateway: 172.30.0.1
  shared-db:
    driver: bridge
    subnet: 172.31.0.0/16
    gateway: 172.31.0.1
  monitoring_net:
    driver: bridge
    subnet: 172.32.0.0/16
    gateway: 172.32.0.1

dangling_images:
  - size: 245300000
    created: "2025-11-15T04:00:00Z"
  - size: 89700000
    created: "2025-10-20T02:00:00Z"

containers:
  - name: portainer
    image: portainer/portainer-ce:latest
    networks:
      - bridge
  - name: watchtower
    image: containrrr/watchtower:latest
    networks:
      - bridge
  - name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:stable
    state: exited
    networks:
      - bridge
